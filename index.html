<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Josh Walls — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --text:#f5f5f0;
  --muted:#444;
  --pink:#f72585;
  --pink2:rgba(247,37,133,0.15);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;cursor:none;user-select:none}

/* CURSOR */
#cur{position:fixed;z-index:9999;pointer-events:none;left:0;top:0;transition:transform .15s cubic-bezier(.16,1,.3,1)}
#cur svg{width:20px;height:20px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.9))}
#cur.h{transform:scale(1.4)}
#cur.c{transform:scale(.82)}
#cur.grab{transform:scale(1.2) rotate(-15deg)}

/* NOISE always on */
#noise{position:fixed;inset:0;z-index:9970;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px}

/* ═══════════════════════════
   LEVER SCREEN
═══════════════════════════ */
#screen-lever{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 30%, #111 0%, #050505 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s ease;
}
#screen-lever.off{opacity:0;pointer-events:none}

.lever-room-line{
  position:absolute;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(to top,#0d0d0d,transparent);
}

/* wall texture lines */
#screen-lever::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.012) 0px,transparent 1px,transparent 80px);
  pointer-events:none;
}

.lever-label{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.3em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:3rem;opacity:.7;
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.8}}

/* lever housing */
.lever-housing{
  width:80px;height:240px;position:relative;
  display:flex;flex-direction:column;align-items:center;
}

.lever-track{
  position:absolute;left:50%;transform:translateX(-50%);
  width:6px;height:100%;
  background:linear-gradient(to bottom,#1a1a1a,#0f0f0f);
  border-radius:3px;
  box-shadow:inset 0 0 6px rgba(0,0,0,.8),0 0 0 1px #222;
}
.lever-track::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:2px;height:100%;
  background:linear-gradient(to bottom,#333,#1a1a1a);
  border-radius:1px;
}

/* notches */
.lever-notch{
  position:absolute;left:50%;transform:translateX(-50%);
  width:20px;height:2px;background:#222;border-radius:1px;
}

/* the lever arm + handle */
.lever-arm{
  position:absolute;left:50%;top:0;
  transform:translateX(-50%) translateY(0px);
  display:flex;flex-direction:column;align-items:center;
  transition:none;
  z-index:2;
}
.lever-arm.snap{transition:transform .18s cubic-bezier(.16,1,.3,1)}
.lever-arm.spring{transition:transform .35s cubic-bezier(.34,1.56,.64,1)}

.lever-rod{
  width:10px;height:90px;
  background:linear-gradient(to right,#555,#888,#555);
  border-radius:5px 5px 2px 2px;
  box-shadow:0 4px 12px rgba(0,0,0,.8),inset 1px 0 1px rgba(255,255,255,.1);
}

.lever-handle{
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#aaa,#444);
  box-shadow:0 6px 20px rgba(0,0,0,.8),0 2px 4px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:.5rem;color:rgba(0,0,0,.4);
  letter-spacing:.05em;
}

.lever-base{
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  width:50px;height:14px;
  background:linear-gradient(to bottom,#333,#1a1a1a);
  border-radius:3px;
  box-shadow:0 4px 8px rgba(0,0,0,.6),0 0 0 1px #111;
}

/* screws on housing */
.lever-screw{
  position:absolute;left:50%;
  width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#555,#222);
  box-shadow:0 1px 3px rgba(0,0,0,.7);
  transform:translateX(-50%);
}
.lever-screw.top{top:-16px}
.lever-screw.bot{bottom:-20px}

.lever-hint{
  position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);white-space:nowrap;
  opacity:.5;transition:opacity .3s;
}

/* power indicator */
.lever-power{
  position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  width:8px;height:8px;border-radius:50%;
  background:#1a1a1a;box-shadow:0 0 0 1px #333;
  transition:background .3s,box-shadow .3s;
}
.lever-power.on{background:var(--pink);box-shadow:0 0 8px var(--pink),0 0 0 1px var(--pink)}

/* flash overlay */
#flash{
  position:fixed;inset:0;z-index:9900;
  background:white;opacity:0;pointer-events:none;
  transition:opacity .08s;
}

/* ═══════════════════════════
   SPOTLIGHT LANDING
═══════════════════════════ */
#screen-spotlight{
  position:fixed;inset:0;z-index:80;
  background:#080808;
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
#screen-spotlight.on{opacity:1;pointer-events:all}

/* ceiling */
.ceil{
  position:absolute;top:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,#111,#0a0a0a);
  border-bottom:1px solid #1a1a1a;
}
/* ceiling bar */
.ceil-bar{
  position:absolute;top:18px;left:10%;right:10%;height:6px;
  background:linear-gradient(to right,#1a1a1a,#2a2a2a,#1a1a1a);
  border-radius:3px;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}

/* spotlight fixtures */
.spl-fixture{
  position:absolute;top:0;
  display:flex;flex-direction:column;align-items:center;
}
#spl-a{left:28%}
#spl-b{right:28%; left:auto}

.spl-head{
  width:36px;height:22px;
  background:linear-gradient(to bottom,#2a2a2a,#1a1a1a);
  border-radius:4px 4px 8px 8px;
  box-shadow:0 2px 6px rgba(0,0,0,.6),0 0 0 1px #111;
  position:relative;
}
.spl-head::after{
  content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:20px;height:4px;border-radius:0 0 6px 6px;
  background:linear-gradient(to bottom,#555,#333);
}

/* the light cone — CSS clip-path triangle */
.spl-cone{
  position:absolute;top:60px;
  transform-origin:top center;
  pointer-events:none;
}
#spl-a .spl-cone{left:28%; transform:translateX(-50%)}
#spl-b .spl-cone{right:28%; left:auto; transform:translateX(50%)}

.spl-cone canvas{display:block}

/* floor spots */
.spl-floor{
  position:absolute;bottom:0;
  border-radius:50%;
  pointer-events:all;
  cursor:none;
  transition:transform .3s cubic-bezier(.16,1,.3,1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;
}
.spl-floor:hover{transform:scale(1.03)}
#floor-a{left:28%;transform:translateX(-50%)}
#floor-b{right:28%;transform:translateX(50%)}

.spl-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,6vw,6rem);
  letter-spacing:.05em;
  color:rgba(245,245,240,.85);
  text-shadow:0 2px 30px rgba(247,37,133,.3);
  text-align:center;
  line-height:1;
}
.spl-sublabel{
  font-family:'DM Mono',monospace;font-size:.62rem;
  letter-spacing:.2em;text-transform:uppercase;
  color:rgba(245,245,240,.35);text-align:center;
}

/* dust particles */
#dust{position:absolute;inset:0;pointer-events:none;overflow:hidden}

/* header */
.spl-header{
  position:absolute;top:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 2.5rem;z-index:2;
}
.spl-logo{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,245,240,.3)}
.spl-footer{
  position:absolute;bottom:1rem;left:0;right:0;
  text-align:center;z-index:2;
  font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(245,245,240,.2);
}

/* ═══════════════════════════
   IMAGE CAROUSEL (spotlight)
═══════════════════════════ */
#screen-carousel{
  position:fixed;inset:0;z-index:70;
  background:#060606;
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
#screen-carousel.on{opacity:1;pointer-events:all}

/* moving spotlight that follows mouse */
#car-spotlight{
  position:absolute;
  width:900px;height:900px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,240,200,.07) 0%,rgba(255,240,200,.03) 35%,transparent 70%);
  pointer-events:none;z-index:1;
  transform:translate(-50%,-50%);
  transition:left .4s cubic-bezier(.23,1,.32,1),top .4s cubic-bezier(.23,1,.32,1);
}

/* strong focused beam on current image */
#car-beam{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,245,210,.12) 0%,rgba(255,245,210,.05) 40%,transparent 70%);
  pointer-events:none;z-index:1;
  transform:translate(-50%,-50%);
  top:50%;left:50%;
  transition:opacity .4s;
}

#car-header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.75rem 2.5rem;
  background:linear-gradient(to bottom,rgba(6,6,6,.95) 0%,transparent 100%);
}
#car-back{background:none;border:none;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.5rem;transition:color .2s;padding:0}
#car-back:hover{color:var(--text)}
#car-back .arr{display:inline-block;transition:transform .2s}
#car-back:hover .arr{transform:translateX(-4px)}
#car-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;color:var(--text)}
#car-counter{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--muted)}

/* slide track */
#car-track-wrap{position:absolute;inset:0;overflow:hidden;z-index:2}
#car-track{position:absolute;top:0;left:0;height:100%;display:flex;will-change:transform}

.car-slide{
  position:relative;width:100vw;height:100vh;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.car-slide-blur{
  position:absolute;inset:-12%;z-index:0;
  background-size:cover;background-position:center;
  filter:blur(40px) brightness(.12) saturate(.3);
}
.car-slide-fadeL,.car-slide-fadeR{
  position:absolute;top:0;bottom:0;z-index:2;width:200px;pointer-events:none;
}
.car-slide-fadeL{left:0;background:linear-gradient(to right,rgba(6,6,6,1) 0%,rgba(6,6,6,.5) 50%,transparent 100%)}
.car-slide-fadeR{right:0;background:linear-gradient(to left,rgba(6,6,6,1) 0%,rgba(6,6,6,.5) 50%,transparent 100%)}
.car-slide-fadeT{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(6,6,6,.6) 0%,transparent 18%,transparent 80%,rgba(6,6,6,.6) 100%)}

.car-slide-media{
  position:relative;z-index:3;
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;padding:5.5rem 9rem 5rem;
}
.car-slide-media img{
  max-width:100%;max-height:100%;
  object-fit:contain;display:block;
  border-radius:1px;
  box-shadow:0 30px 100px rgba(0,0,0,.9),0 4px 16px rgba(0,0,0,.6);
  will-change:transform;
}

.car-slide-info{
  position:absolute;bottom:2.5rem;left:9rem;z-index:4;
  opacity:0;transform:translateY(6px);
  transition:opacity .4s,transform .4s;
}
.car-slide-info.peek{opacity:1;transform:none}
.car-slide-desc{font-size:.82rem;color:rgba(245,245,240,.5);line-height:1.6;font-weight:300;max-width:500px;margin-bottom:.35rem}
.car-slide-name{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:rgba(245,245,240,.25)}

/* arrows */
.car-nav{
  position:fixed;top:50%;transform:translateY(-50%);z-index:50;
  background:none;border:none;color:rgba(245,245,240,.2);
  font-size:2.5rem;padding:1.25rem;transition:color .25s;
}
#car-prev{left:.25rem}
#car-next{right:.25rem}
.car-nav:hover{color:var(--pink)}

/* progress */
#car-progress{position:fixed;bottom:0;left:0;height:2px;background:var(--pink);z-index:50;transition:width .35s ease}

/* thumbs */
#car-thumbs{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  z-index:50;display:flex;gap:5px;align-items:center;max-width:70vw;overflow-x:auto;
}
#car-thumbs::-webkit-scrollbar{display:none}
.car-thumb{width:36px;height:36px;border-radius:2px;overflow:hidden;opacity:.25;transition:opacity .2s,transform .2s;flex-shrink:0}
.car-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.car-thumb.active{opacity:1;transform:scale(1.3);outline:1.5px solid var(--pink);outline-offset:2px}

/* ═══════════════════════════
   TV SCREEN
═══════════════════════════ */
#screen-tv{
  position:fixed;inset:0;z-index:70;
  background:#030303;
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
  display:flex;align-items:center;justify-content:center;
}
#screen-tv.on{opacity:1;pointer-events:all}

/* room behind TV */
.tv-room{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 70%,#0f0f0f 0%,#050505 60%);
}
.tv-room::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.008) 0px,transparent 1px,transparent 60px);
}
/* glow behind TV */
.tv-glow{
  position:absolute;width:80vw;height:50vh;
  background:radial-gradient(ellipse,rgba(247,37,133,.06) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

/* TV set */
.tv-set{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
}
.tv-body{
  background:linear-gradient(145deg,#1e1e1e,#111);
  border-radius:12px 12px 8px 8px;
  padding:14px 16px 22px;
  box-shadow:0 20px 60px rgba(0,0,0,.9),0 4px 12px rgba(0,0,0,.6),inset 0 1px 1px rgba(255,255,255,.05),0 0 0 1px #222;
  position:relative;
}
.tv-body::before{
  content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:60%;height:3px;border-radius:2px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.04),transparent);
}
/* screen bezel */
.tv-bezel{
  background:#080808;border-radius:6px;
  padding:6px;
  box-shadow:inset 0 0 20px rgba(0,0,0,.9),0 0 0 1px #1a1a1a;
  position:relative;overflow:hidden;
}
/* screen */
.tv-screen{
  width:min(72vw,860px);
  height:min(45vw,538px);
  background:#000;border-radius:3px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* scanlines */
.tv-scanlines{
  position:absolute;inset:0;z-index:10;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.28) 0px,rgba(0,0,0,.28) 1px,transparent 1px,transparent 3px);
}
/* vignette on screen */
.tv-vignette{
  position:absolute;inset:0;z-index:9;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,.7) 100%);
}
/* curvature glare */
.tv-glare{
  position:absolute;top:3%;left:5%;width:40%;height:25%;z-index:11;pointer-events:none;
  background:radial-gradient(ellipse,rgba(255,255,255,.04) 0%,transparent 80%);
  border-radius:50%;transform:rotate(-15deg);
}

/* video element */
#tv-video{
  width:100%;height:100%;object-fit:cover;
  display:block;position:relative;z-index:1;
}
/* static overlay canvas */
#tv-static{
  position:absolute;inset:0;z-index:8;pointer-events:none;opacity:0;
  transition:opacity .05s;
}

/* channel info */
#tv-channel{
  position:absolute;top:.75rem;right:.85rem;z-index:12;
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  color:rgba(247,37,133,.7);
  text-shadow:0 0 6px rgba(247,37,133,.5);
  pointer-events:none;
}
#tv-title{
  position:absolute;bottom:.75rem;left:.85rem;z-index:12;
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;
  color:rgba(245,245,240,.4);pointer-events:none;
  max-width:60%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* tv bottom controls */
.tv-controls{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 8px;margin-top:10px;gap:1rem;
}
.tv-knobs{display:flex;gap:8px;align-items:center}
.tv-knob{
  width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#444,#1a1a1a);
  box-shadow:0 2px 4px rgba(0,0,0,.7),inset 0 1px 1px rgba(255,255,255,.08);
  position:relative;
}
.tv-knob::after{content:'';position:absolute;top:50%;left:50%;width:1px;height:5px;background:rgba(255,255,255,.3);transform:translate(-50%,-100%);border-radius:1px}
.tv-brand{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.15em;color:rgba(255,255,255,.12)}
.tv-power-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);box-shadow:0 0 6px var(--pink)}

/* stand */
.tv-stand-neck{width:4px;height:28px;background:linear-gradient(to bottom,#222,#111);margin:0 auto}
.tv-stand-base{
  width:min(30vw,220px);height:12px;
  background:linear-gradient(to bottom,#1e1e1e,#111);
  border-radius:6px;
  box-shadow:0 4px 12px rgba(0,0,0,.8),0 0 0 1px #222;
}

/* empty state on tv */
#tv-empty{
  position:absolute;inset:0;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  background:#050505;
}
#tv-empty p{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;color:rgba(245,245,240,.2);text-align:center}
#tv-empty span{color:var(--pink)}

/* tv header */
#tv-header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.75rem 2.5rem;
  background:linear-gradient(to bottom,rgba(3,3,3,.95) 0%,transparent 100%);
}
#tv-back{background:none;border:none;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.5rem;transition:color .2s;padding:0}
#tv-back:hover{color:var(--text)}
#tv-back .arr{display:inline-block;transition:transform .2s}
#tv-back:hover .arr{transform:translateX(-4px)}
.tv-header-hint{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* click ripple on screen */
.tv-click-hint{
  position:absolute;inset:0;z-index:13;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.tv-click-hint.show{opacity:1}
.tv-click-hint p{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,245,240,.3);animation:clickpulse 2s ease-in-out infinite}
@keyframes clickpulse{0%,100%{opacity:.2}50%{opacity:.6}}

@keyframes fadeUp{to{opacity:1;transform:none}}
@media(max-width:640px){
  .car-slide-media{padding:4rem 1.5rem 4.5rem}
  .car-slide-info{left:1.5rem}
  #tv-header{padding:1.25rem 1.5rem}
  #car-header{padding:1.25rem 1.5rem}
  .tv-screen{width:94vw;height:59vw}
  .tv-body{padding:10px 12px 18px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div id="cur"><svg viewBox="0 0 20 20" fill="none"><path d="M3.5 2L17 9.8L10.8 11.4L7.8 18.5L3.5 2Z" fill="white" stroke="#080808" stroke-width="1.1" stroke-linejoin="round"/></svg></div>
<div id="noise"></div>
<div id="flash"></div>

<!-- ══ LEVER ══ -->
<div id="screen-lever">
  <div class="lever-room-line"></div>
  <p class="lever-label">Josh Walls — Portfolio</p>

  <div class="lever-housing" id="lever-housing">
    <div class="lever-track">
      <div class="lever-notch" style="top:20%"></div>
      <div class="lever-notch" style="top:50%"></div>
      <div class="lever-notch" style="top:80%"></div>
    </div>
    <div class="lever-screw top"></div>
    <div class="lever-screw bot"></div>
    <div class="lever-power" id="lever-power"></div>

    <div class="lever-arm" id="lever-arm">
      <div class="lever-handle">PULL</div>
      <div class="lever-rod"></div>
    </div>

    <div class="lever-base"></div>
    <p class="lever-hint" id="lever-hint">Drag down to enter</p>
  </div>
</div>

<!-- ══ SPOTLIGHT LANDING ══ -->
<div id="screen-spotlight">
  <div class="ceil"><div class="ceil-bar"></div></div>
  <canvas id="dust" width="1" height="1"></canvas>

  <div class="spl-header">
    <span class="spl-logo">JW™</span>
    <span class="spl-logo" style="opacity:.4">Graphic Design</span>
  </div>

  <!-- spotlight A: images -->
  <div class="spl-fixture" id="spl-a">
    <div class="spl-head"></div>
  </div>
  <canvas id="cone-a"></canvas>
  <div class="spl-floor" id="floor-a" data-type="images">
    <span class="spl-label">Images</span>
    <span class="spl-sublabel" id="spl-count-a">— pieces</span>
  </div>

  <!-- spotlight B: videos -->
  <div class="spl-fixture" id="spl-b">
    <div class="spl-head"></div>
  </div>
  <canvas id="cone-b"></canvas>
  <div class="spl-floor" id="floor-b" data-type="videos">
    <span class="spl-label">Videos</span>
    <span class="spl-sublabel" id="spl-count-b">— pieces</span>
  </div>

  <div class="spl-footer">© 2026 Josh Walls · Built with Claude · Anthropic</div>
</div>

<!-- ══ IMAGE CAROUSEL ══ -->
<div id="screen-carousel">
  <div id="car-spotlight"></div>
  <div id="car-beam"></div>

  <div id="car-header">
    <button id="car-back"><span class="arr">←</span> Back</button>
    <span id="car-title">Images</span>
    <span id="car-counter"></span>
  </div>

  <div id="car-track-wrap">
    <div id="car-track"></div>
  </div>

  <button class="car-nav" id="car-prev">‹</button>
  <button class="car-nav" id="car-next">›</button>
  <div id="car-progress"></div>
  <div id="car-thumbs"></div>
</div>

<!-- ══ TV ══ -->
<div id="screen-tv">
  <div class="tv-room"></div>
  <div class="tv-glow"></div>

  <div id="tv-header">
    <button id="tv-back"><span class="arr">←</span> Back</button>
    <span class="tv-header-hint">Click screen to change channel</span>
  </div>

  <div class="tv-set">
    <div class="tv-body">
      <div class="tv-bezel">
        <div class="tv-screen" id="tv-screen">
          <video id="tv-video" playsinline loop></video>
          <canvas id="tv-static"></canvas>
          <div class="tv-scanlines"></div>
          <div class="tv-vignette"></div>
          <div class="tv-glare"></div>
          <div id="tv-channel">CH 01</div>
          <div id="tv-title"></div>
          <div class="tv-click-hint" id="tv-click-hint"><p>Click to change channel</p></div>
          <div id="tv-empty" style="display:none">
            <p>No videos yet.<br>Add files to <span>videos/</span></p>
          </div>
        </div>
      </div>
      <div class="tv-controls">
        <div class="tv-knobs">
          <div class="tv-knob"></div>
          <div class="tv-knob" style="width:14px;height:14px"></div>
        </div>
        <span class="tv-brand">JW-TV</span>
        <div class="tv-knobs">
          <div class="tv-power-dot"></div>
          <div class="tv-knob"></div>
        </div>
      </div>
    </div>
    <div class="tv-stand-neck"></div>
    <div class="tv-stand-base"></div>
  </div>
</div>

<script>
/* ══ CONFIG ══ */
const REPO='hutch7575/portfolio',BRANCH='main';
const API=`https://api.github.com/repos/${REPO}/contents`;
const RAW=`https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const IMG_EXT=['jpg','jpeg','png','gif','webp','avif'];
const VID_EXT=['mp4','webm','mov','ogg'];
const ext=f=>f.split('.').pop().toLowerCase();

/* ══ CURSOR ══ */
const cur=document.getElementById('cur');
let curX=0,curY=0;
document.addEventListener('mousemove',e=>{curX=e.clientX;curY=e.clientY;cur.style.left=curX+'px';cur.style.top=curY+'px'});
document.addEventListener('mouseover',e=>cur.classList.toggle('h',!!e.target.closest('button,.cat-panel,.spl-floor,.gal-item,#tv-screen')));
document.addEventListener('mousedown',()=>cur.classList.add('c'));
document.addEventListener('mouseup',()=>cur.classList.remove('c'));

/* ══ PAGES ══ */
function showOnly(id){
  ['screen-lever','screen-spotlight','screen-carousel','screen-tv'].forEach(s=>{
    const el=document.getElementById(s);
    if(s===id){el.style.opacity='1';el.style.pointerEvents='all'}
    else{el.style.opacity='0';el.style.pointerEvents='none'}
  });
}

/* ══ LEVER ══ */
const leverArm=document.getElementById('lever-arm');
const leverPower=document.getElementById('lever-power');
const leverHint=document.getElementById('lever-hint');
const flash=document.getElementById('flash');
let leverY=0,dragging=false,dragStartY=0,dragStartLever=0;
const LEVER_MAX=140;

function setLeverY(y,animate=false){
  leverY=Math.max(0,Math.min(y,LEVER_MAX));
  leverArm.classList.toggle('snap',animate);
  leverArm.style.transform=`translateX(-50%) translateY(${leverY}px)`;
  // resistance feel — slow down near top notches
  const prog=leverY/LEVER_MAX;
  if(prog>0.15) leverPower.classList.add('on');
  else leverPower.classList.remove('on');
  if(prog>0.5) leverHint.style.opacity='0';
  else leverHint.style.opacity=String(.5-prog);
}

leverArm.addEventListener('mousedown',e=>{
  dragging=true;dragStartY=e.clientY;dragStartLever=leverY;
  cur.classList.add('grab');e.preventDefault();
});
leverArm.addEventListener('touchstart',e=>{
  dragging=true;dragStartY=e.touches[0].clientY;dragStartLever=leverY;e.preventDefault();
},{passive:false});

document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const delta=e.clientY-dragStartY;
  // add resistance near middle
  const raw=dragStartLever+delta;
  const resistance=1-(Math.abs(raw-LEVER_MAX/2)/(LEVER_MAX*1.5));
  setLeverY(dragStartLever+delta*Math.max(0.4,resistance));
});
document.addEventListener('touchmove',e=>{
  if(!dragging)return;
  const delta=e.touches[0].clientY-dragStartY;
  setLeverY(dragStartLever+delta*.85);
  e.preventDefault();
},{passive:false});

document.addEventListener('mouseup',()=>{
  if(!dragging)return;dragging=false;cur.classList.remove('grab');
  if(leverY>LEVER_MAX*.72){
    setLeverY(LEVER_MAX,true);
    setTimeout(triggerPowerOn,200);
  } else {
    // spring back
    leverArm.classList.add('spring');
    setLeverY(0);
    setTimeout(()=>leverArm.classList.remove('spring'),400);
  }
});
document.addEventListener('touchend',()=>{
  if(!dragging)return;dragging=false;
  if(leverY>LEVER_MAX*.72){setLeverY(LEVER_MAX,true);setTimeout(triggerPowerOn,200);}
  else{leverArm.classList.add('spring');setLeverY(0);setTimeout(()=>leverArm.classList.remove('spring'),400);}
});

function triggerPowerOn(){
  // flash
  flash.style.opacity='0.7';
  setTimeout(()=>{flash.style.transition='opacity .4s';flash.style.opacity='0';},60);
  setTimeout(()=>{flash.style.transition='';},500);
  document.getElementById('screen-lever').classList.add('off');
  setTimeout(()=>{
    document.getElementById('screen-lever').style.display='none';
    showSpotlight();
  },700);
}

/* ══ SPOTLIGHT ══ */
function showSpotlight(){
  document.getElementById('screen-spotlight').style.opacity='1';
  document.getElementById('screen-spotlight').style.pointerEvents='all';
  drawCones();
  startDust();
}

/* draw light cones on canvas */
function drawCones(){
  const W=window.innerWidth,H=window.innerHeight;
  // cone A
  const ca=document.getElementById('cone-a');
  ca.width=W;ca.height=H;
  ca.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:0';
  const ctxA=ca.getContext('2d');
  drawOneCone(ctxA,W,H,W*.28,60,W*.18,H*.68,'rgba(255,240,180,');

  // cone B
  const cb=document.getElementById('cone-b');
  cb.width=W;cb.height=H;
  cb.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:0';
  const ctxB=cb.getContext('2d');
  drawOneCone(ctxB,W,H,W*.72,60,W*.18,H*.68,'rgba(255,235,200,');

  // position floor spots
  const fa=document.getElementById('floor-a');
  const fb=document.getElementById('floor-b');
  const spotR=Math.min(W*.16,160);
  fa.style.cssText=`position:absolute;left:${W*.28}px;bottom:${H*.06}px;transform:translateX(-50%);width:${spotR*2}px;height:${spotR*2}px`;
  fb.style.cssText=`position:absolute;left:${W*.72}px;bottom:${H*.06}px;transform:translateX(-50%);width:${spotR*2}px;height:${spotR*2}px`;
}

function drawOneCone(ctx,W,H,tipX,tipY,baseW,baseY,colorStr){
  const grad=ctx.createLinearGradient(tipX,tipY,tipX,baseY);
  grad.addColorStop(0,colorStr+'0)');
  grad.addColorStop(0.3,colorStr+'.025)');
  grad.addColorStop(0.7,colorStr+'.045)');
  grad.addColorStop(1,colorStr+'0)');
  ctx.beginPath();
  ctx.moveTo(tipX,tipY);
  ctx.lineTo(tipX-baseW,baseY);
  ctx.lineTo(tipX+baseW,baseY);
  ctx.closePath();
  ctx.fillStyle=grad;
  ctx.fill();
  // edge halos
  const edgeGrad=ctx.createLinearGradient(tipX-baseW,0,tipX,0);
  edgeGrad.addColorStop(0,colorStr+'0)');
  edgeGrad.addColorStop(1,colorStr+'.02)');
  ctx.fillStyle=edgeGrad;ctx.fill();
}

/* dust particles */
let dustParticles=[];
function startDust(){
  const canvas=document.getElementById('dust');
  const W=window.innerWidth,H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  canvas.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:1';
  for(let i=0;i<60;i++){
    dustParticles.push({
      x:W*(.15+Math.random()*.7),y:H*(.1+Math.random()*.8),
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.15,
      r:Math.random()*1.5+.3,a:Math.random()*.4+.05
    });
  }
  animDust(canvas);
}
function animDust(canvas){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  dustParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<W*.1||p.x>W*.9)p.vx*=-1;
    if(p.y<H*.05||p.y>H*.9)p.vy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,240,200,${p.a})`;ctx.fill();
  });
  if(document.getElementById('screen-spotlight').style.opacity==='1')requestAnimationFrame(()=>animDust(canvas));
}

window.addEventListener('resize',()=>{if(document.getElementById('screen-spotlight').style.opacity==='1')drawCones()});

/* spotlight click */
document.getElementById('floor-a').addEventListener('click',()=>openCarousel());
document.getElementById('floor-b').addEventListener('click',()=>openTV());

/* ══ DATA ══ */
let imageFiles=[],videoFiles=[],descriptions={};

async function loadData(){
  const [imgs,vids,desc]=await Promise.all([
    fetch(`${API}/images`).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(`${API}/videos`).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(`${RAW}/descriptions.json?t=${Date.now()}`).then(r=>r.ok?r.json():{}).catch(()=>{})
  ]);
  imageFiles=imgs.filter(f=>f.name&&f.name!=='.gitkeep'&&IMG_EXT.includes(ext(f.name)));
  videoFiles=vids.filter(f=>f.name&&f.name!=='.gitkeep'&&VID_EXT.includes(ext(f.name)));
  descriptions=desc||{};
  document.getElementById('spl-count-a').textContent=`${imageFiles.length} piece${imageFiles.length!==1?'s':''}`;
  document.getElementById('spl-count-b').textContent=`${videoFiles.length} piece${videoFiles.length!==1?'s':''}`;
}
loadData();

/* ══ CAROUSEL ══ */
let carIndex=0,carAnimating=false,carLastNX=0;

function openCarousel(){
  buildCarousel();
  document.getElementById('screen-spotlight').style.opacity='0';
  document.getElementById('screen-spotlight').style.pointerEvents='none';
  setTimeout(()=>{
    document.getElementById('screen-carousel').style.opacity='1';
    document.getElementById('screen-carousel').style.pointerEvents='all';
  },100);
}

function buildCarousel(){
  const track=document.getElementById('car-track');
  const thumbs=document.getElementById('car-thumbs');
  track.innerHTML='';thumbs.innerHTML='';
  carIndex=0;

  imageFiles.forEach((file,i)=>{
    const url=`${RAW}/images/${file.name}`;
    const slide=document.createElement('div');slide.className='car-slide';
    const blur=document.createElement('div');blur.className='car-slide-blur';blur.style.backgroundImage=`url(${url})`;
    const fadeL=document.createElement('div');fadeL.className='car-slide-fadeL';
    const fadeR=document.createElement('div');fadeR.className='car-slide-fadeR';
    const fadeT=document.createElement('div');fadeT.className='car-slide-fadeT';
    const media=document.createElement('div');media.className='car-slide-media';
    const img=document.createElement('img');img.src=url;img.alt=file.name;img.loading=i===0?'eager':'lazy';img.draggable=false;
    media.appendChild(img);
    const info=document.createElement('div');info.className='car-slide-info';
    const desc=descriptions[file.name]||'';
    info.innerHTML=`<p class="car-slide-desc">${desc}</p><span class="car-slide-name">${file.name}</span>`;
    slide.append(blur,fadeL,fadeR,fadeT,media,info);
    track.appendChild(slide);
    const thumb=document.createElement('div');thumb.className='car-thumb'+(i===0?' active':'');
    const ti=document.createElement('img');ti.src=url;ti.draggable=false;
    thumb.appendChild(ti);thumb.addEventListener('click',()=>carGoTo(i));
    thumbs.appendChild(thumb);
  });
  carGoTo(0,true);
}

function carGoTo(idx,instant=false){
  if(carAnimating&&!instant)return;
  carAnimating=true;
  carIndex=((idx%imageFiles.length)+imageFiles.length)%imageFiles.length;
  const track=document.getElementById('car-track');
  track.style.transition=instant?'none':'transform .72s cubic-bezier(.16,1,.3,1)';
  track.style.transform=`translateX(${-carIndex*100}vw)`;
  setTimeout(()=>carAnimating=false,instant?0:720);
  document.querySelectorAll('.car-thumb').forEach((t,i)=>t.classList.toggle('active',i===carIndex));
  document.getElementById('car-counter').textContent=String(carIndex+1).padStart(2,'0')+' / '+String(imageFiles.length).padStart(2,'0');
  document.getElementById('car-progress').style.width=((carIndex+1)/imageFiles.length*100)+'%';
  const at=document.querySelectorAll('.car-thumb')[carIndex];
  if(at)at.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});
  // peek info
  document.querySelectorAll('.car-slide-info').forEach(el=>el.classList.remove('peek'));
  const info=document.querySelector(`.car-slide:nth-child(${carIndex+1}) .car-slide-info`);
  if(info){clearTimeout(info._t);info.classList.add('peek');info._t=setTimeout(()=>info.classList.remove('peek'),2500);}
  carApplyParallax(carLastNX);
}

document.getElementById('car-prev').addEventListener('click',()=>carGoTo(carIndex-1));
document.getElementById('car-next').addEventListener('click',()=>carGoTo(carIndex+1));
document.getElementById('car-back').addEventListener('click',()=>{
  document.getElementById('screen-carousel').style.opacity='0';
  document.getElementById('screen-carousel').style.pointerEvents='none';
  setTimeout(()=>{document.getElementById('screen-spotlight').style.opacity='1';document.getElementById('screen-spotlight').style.pointerEvents='all';},100);
});

// spotlight follows mouse in carousel
document.getElementById('screen-carousel').addEventListener('mousemove',e=>{
  document.getElementById('car-spotlight').style.left=e.clientX+'px';
  document.getElementById('car-spotlight').style.top=e.clientY+'px';
  carLastNX=(e.clientX/window.innerWidth-.5)*2;
  carApplyParallax(carLastNX);
});
function carApplyParallax(nx){
  const slide=document.querySelector(`.car-slide:nth-child(${carIndex+1})`);
  if(!slide)return;
  const img=slide.querySelector('img');
  if(img)img.style.transform=`translateX(${nx*10}px)`;
}

// swipe
let carDragStart=null,carDragging=false;
const carVP=document.getElementById('car-track-wrap');
carVP.addEventListener('pointerdown',e=>{carDragStart=e.clientX;carDragging=true;carVP.setPointerCapture(e.pointerId);});
carVP.addEventListener('pointermove',e=>{
  if(!carDragging)return;
  const d=e.clientX-carDragStart;
  const t=document.getElementById('car-track');
  t.style.transition='none';t.style.transform=`translateX(calc(${-carIndex*100}vw + ${d}px))`;
});
carVP.addEventListener('pointerup',e=>{
  if(!carDragging)return;carDragging=false;
  const d=e.clientX-carDragStart;
  if(Math.abs(d)>55)carGoTo(d<0?carIndex+1:carIndex-1);else carGoTo(carIndex);
  carDragStart=null;
});

document.addEventListener('keydown',e=>{
  if(document.getElementById('screen-carousel').style.opacity==='1'){
    if(e.key==='ArrowRight')carGoTo(carIndex+1);
    if(e.key==='ArrowLeft')carGoTo(carIndex-1);
    if(e.key==='Escape')document.getElementById('car-back').click();
  }
  if(document.getElementById('screen-tv').style.opacity==='1'){
    if(e.key==='Escape')document.getElementById('tv-back').click();
  }
});

/* ══ TV ══ */
let tvIndex=0,tvSwitching=false;
const tvVideo=document.getElementById('tv-video');
const tvStatic=document.getElementById('tv-static');
const tvChannel=document.getElementById('tv-channel');
const tvTitleEl=document.getElementById('tv-title');

function openTV(){
  document.getElementById('screen-spotlight').style.opacity='0';
  document.getElementById('screen-spotlight').style.pointerEvents='none';
  setTimeout(()=>{
    document.getElementById('screen-tv').style.opacity='1';
    document.getElementById('screen-tv').style.pointerEvents='all';
    initTV();
  },100);
}

function initTV(){
  if(videoFiles.length===0){
    document.getElementById('tv-empty').style.display='flex';
    tvVideo.style.display='none';
    return;
  }
  document.getElementById('tv-empty').style.display='none';
  tvVideo.style.display='block';
  tvIndex=0;
  loadChannel(tvIndex,true);
  // show click hint briefly
  const hint=document.getElementById('tv-click-hint');
  hint.classList.add('show');
  setTimeout(()=>hint.classList.remove('show'),3500);
}

function loadChannel(idx,instant=false){
  const file=videoFiles[idx];
  const url=`${RAW}/videos/${file.name}`;
  tvChannel.textContent=`CH ${String(idx+1).padStart(2,'0')}`;
  tvTitleEl.textContent=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').toUpperCase();
  if(instant){
    tvVideo.src=url;tvVideo.load();tvVideo.play().catch(()=>{});
    return;
  }
  // static glitch transition
  tvSwitching=true;
  showStatic(true);
  setTimeout(()=>{
    tvVideo.src=url;tvVideo.load();tvVideo.play().catch(()=>{});
    showStatic(false);
    tvSwitching=false;
  },180);
}

// static canvas animation
let staticAF=null;
function showStatic(on){
  if(on){
    tvStatic.style.opacity='1';
    const ctx=tvStatic.getContext('2d');
    const W=tvStatic.offsetWidth||800,H=tvStatic.offsetHeight||500;
    tvStatic.width=W;tvStatic.height=H;
    (function drawStatic(){
      const id=ctx.createImageData(W,H);
      for(let i=0;i<id.data.length;i+=4){
        const v=Math.random()*255|0;
        id.data[i]=v;id.data[i+1]=v;id.data[i+2]=v;id.data[i+3]=Math.random()*200+55;
      }
      ctx.putImageData(id,0,0);
      staticAF=requestAnimationFrame(drawStatic);
    })();
  } else {
    cancelAnimationFrame(staticAF);
    tvStatic.style.opacity='0';
  }
}

document.getElementById('tv-screen').addEventListener('click',()=>{
  if(tvSwitching||videoFiles.length===0)return;
  tvIndex=(tvIndex+1)%videoFiles.length;
  loadChannel(tvIndex);
});

document.getElementById('tv-back').addEventListener('click',()=>{
  tvVideo.pause();tvVideo.src='';
  showStatic(false);
  document.getElementById('screen-tv').style.opacity='0';
  document.getElementById('screen-tv').style.pointerEvents='none';
  setTimeout(()=>{
    document.getElementById('screen-spotlight').style.opacity='1';
    document.getElementById('screen-spotlight').style.pointerEvents='all';
  },100);
});

/* ══ INIT ══ */
// all screens start hidden except lever
document.getElementById('screen-spotlight').style.opacity='0';
document.getElementById('screen-spotlight').style.pointerEvents='none';
document.getElementById('screen-carousel').style.opacity='0';
document.getElementById('screen-carousel').style.pointerEvents='none';
document.getElementById('screen-tv').style.opacity='0';
document.getElementById('screen-tv').style.pointerEvents='none';
</script>
</body>
</html>
