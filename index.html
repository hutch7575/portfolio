<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --text: #f0ede6;
      --muted: #444;
      --border: #1e1e1e;
      --accent: #ff2d78;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cursor-dot {
      position: fixed; z-index: 9999;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
    }
    #cursor-ring {
      position: fixed; z-index: 9998;
      width: 34px; height: 34px;
      border: 1px solid rgba(255,45,120,0.5);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s, border-color .2s;
    }
    body.hovering #cursor-ring {
      width: 54px; height: 54px;
      border-color: rgba(255,45,120,0.9);
    }

    /* ── NOISE ── */
    body::after {
      content:'';
      position:fixed; inset:0; z-index:9990;
      pointer-events:none;
      opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px;
    }

    /* ══════════════════════════════════
       LANDING
    ══════════════════════════════════ */
    #landing {
      position: fixed; inset: 0; z-index: 10;
      display: flex;
      flex-direction: column;
      transition: opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1);
    }
    #landing.out {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    .landing-nav {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }
    .landing-logo {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text);
    }
    .landing-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .landing-split {
      display: flex;
      width: 100%; height: 100%;
    }

    .landing-card {
      flex: 1;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 3rem;
      overflow: hidden;
      transition: flex .5s cubic-bezier(.16,1,.3,1);
    }
    .landing-card:hover { flex: 1.18; }

    .landing-card::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--bg);
      transition: opacity .4s;
    }
    .landing-card:hover::before { opacity: 0.5; }

    .card-divider {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
      z-index: 2;
      position: relative;
    }
    .card-divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 1px;
      height: 60px;
      background: var(--accent);
      animation: divPulse 2s ease-in-out infinite;
    }
    @keyframes divPulse {
      0%,100% { opacity:.3; height:40px; }
      50% { opacity:1; height:80px; }
    }

    .card-bg {
      position: absolute; inset: -10%;
      background-size: cover;
      background-position: center;
      filter: brightness(0.15) saturate(0.3);
      transition: filter .5s, transform .5s cubic-bezier(.16,1,.3,1);
    }
    .landing-card:hover .card-bg {
      filter: brightness(0.3) saturate(0.5);
      transform: scale(1.03);
    }

    /* animated gradient bg for empty state */
    .card-grad-a {
      background: radial-gradient(ellipse at 30% 60%, #ff2d7833 0%, transparent 70%),
                  radial-gradient(ellipse at 80% 20%, #3a003322 0%, transparent 60%), #080808;
      animation: bgShiftA 8s ease-in-out infinite alternate;
    }
    .card-grad-b {
      background: radial-gradient(ellipse at 70% 40%, #ff2d7822 0%, transparent 70%),
                  radial-gradient(ellipse at 20% 80%, #00113322 0%, transparent 60%), #080808;
      animation: bgShiftB 8s ease-in-out infinite alternate;
    }
    @keyframes bgShiftA {
      from { filter: brightness(0.15) saturate(0.3) hue-rotate(0deg); }
      to   { filter: brightness(0.2) saturate(0.5) hue-rotate(10deg); }
    }
    @keyframes bgShiftB {
      from { filter: brightness(0.15) saturate(0.3) hue-rotate(0deg); }
      to   { filter: brightness(0.2) saturate(0.5) hue-rotate(-10deg); }
    }

    .card-content {
      position: relative; z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp .5s forwards;
    }
    .landing-card:nth-child(1) .card-label { animation-delay: .4s; }
    .landing-card:nth-child(3) .card-label { animation-delay: .55s; }

    .card-title {
      font-size: clamp(3rem, 7vw, 7rem);
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: .9;
      color: var(--text);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp .6s forwards;
      transition: color .3s;
    }
    .landing-card:nth-child(1) .card-title { animation-delay: .5s; }
    .landing-card:nth-child(3) .card-title { animation-delay: .65s; }
    .landing-card:hover .card-title { color: var(--accent); }

    .card-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: .08em;
      opacity: 0;
      animation: fadeUp .5s forwards;
    }
    .landing-card:nth-child(1) .card-count { animation-delay: .6s; }
    .landing-card:nth-child(3) .card-count { animation-delay: .75s; }

    .card-arrow {
      font-size: 2rem;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-10px);
      transition: opacity .3s, transform .3s;
      line-height: 1;
      margin-top: .5rem;
    }
    .landing-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ══════════════════════════════════
       GALLERY
    ══════════════════════════════════ */
    #gallery {
      position: fixed; inset: 0; z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s;
    }
    #gallery.active {
      opacity: 1;
      pointer-events: all;
    }

    /* back button */
    #back-btn {
      position: fixed;
      top: 2rem; left: 3rem;
      z-index: 200;
      background: none; border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: none;
      display: flex; align-items: center; gap: .75rem;
      transition: color .2s;
    }
    #back-btn:hover { color: var(--text); }
    #back-btn::before {
      content: '←';
      font-size: 1rem;
      transition: transform .2s;
    }
    #back-btn:hover::before { transform: translateX(-4px); }

    /* gallery title */
    #gallery-title {
      position: fixed;
      top: 2rem; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* counter */
    #gallery-counter {
      position: fixed;
      top: 2rem; right: 3rem;
      z-index: 200;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: .1em;
      color: var(--muted);
    }

    /* carousel track */
    #carousel {
      position: absolute; inset: 0;
      display: flex;
      align-items: center;
      will-change: transform;
    }

    .slide {
      position: absolute;
      top: 0; bottom: 0;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide-media-wrap {
      position: absolute; inset: 0;
      overflow: hidden;
    }

    .slide-media-wrap img,
    .slide-media-wrap video {
      position: absolute;
      top: -10%; left: -5%;
      width: 110%; height: 120%;
      object-fit: cover;
      will-change: transform;
    }

    /* dim overlay */
    .slide::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,8,8,.7) 0%, rgba(8,8,8,.1) 40%, rgba(8,8,8,.1) 60%, rgba(8,8,8,.7) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* slide info */
    .slide-info {
      position: absolute;
      bottom: 3rem; left: 3rem;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .slide-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: .1em;
      color: rgba(240,237,230,0.6);
    }

    /* nav arrows */
    .gallery-nav {
      position: fixed;
      top: 50%; z-index: 200;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted);
      font-size: 2rem;
      cursor: none;
      padding: 1rem;
      transition: color .2s, transform .2s;
    }
    #prev-btn { left: 1.5rem; }
    #next-btn { right: 1.5rem; }
    .gallery-nav:hover { color: var(--accent); }
    #prev-btn:hover { transform: translateY(-50%) translateX(-4px); }
    #next-btn:hover { transform: translateY(-50%) translateX(4px); }

    /* progress bar */
    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 2px;
      background: var(--accent);
      z-index: 200;
      transition: width .3s ease;
    }

    /* thumbnail strip */
    #thumb-strip {
      position: fixed;
      bottom: 2.5rem; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .thumb {
      width: 32px; height: 32px;
      border-radius: 2px;
      overflow: hidden;
      opacity: .35;
      transition: opacity .2s, transform .2s;
      flex-shrink: 0;
      cursor: none;
    }
    .thumb img, .thumb video {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .thumb.active {
      opacity: 1;
      transform: scale(1.25);
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }

    /* empty gallery */
    #gallery-empty {
      display: none;
      position: absolute; inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
    }
    #gallery-empty.show { display: flex; }
    #gallery-empty p {
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
      letter-spacing: .1em;
      color: var(--muted);
    }
    #gallery-empty span { color: var(--accent); }

    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }

    @media (max-width: 640px) {
      .landing-split { flex-direction: column; }
      .card-divider { width: 100%; height: 1px; }
      .card-divider::after { width: 80px; height: 1px; top: 50%; left: 50%; }
      .landing-card { padding: 2rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>

  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <!-- ── LANDING ── -->
  <div id="landing">
    <div class="landing-nav">
      <span class="landing-logo">YN™ Portfolio</span>
      <span class="landing-hint">Select a category</span>
    </div>
    <div class="landing-split">
      <div class="landing-card" id="card-images" data-type="images">
        <div class="card-bg card-grad-a" id="card-bg-images"></div>
        <div class="card-content">
          <span class="card-label">Category 01</span>
          <h2 class="card-title">Images</h2>
          <span class="card-count" id="count-images">— files</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="landing-card" id="card-videos" data-type="videos">
        <div class="card-bg card-grad-b" id="card-bg-videos"></div>
        <div class="card-content">
          <span class="card-label">Category 02</span>
          <h2 class="card-title">Videos</h2>
          <span class="card-count" id="count-videos">— files</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── GALLERY ── -->
  <div id="gallery">
    <button id="back-btn">Back</button>
    <span id="gallery-title"></span>
    <span id="gallery-counter"></span>
    <div id="carousel"></div>
    <div id="gallery-empty">
      <p>No files yet.</p>
      <p>Drop files into <span id="empty-folder"></span> to see them here.</p>
    </div>
    <button class="gallery-nav" id="prev-btn">‹</button>
    <button class="gallery-nav" id="next-btn">›</button>
    <div id="progress-bar"></div>
    <div id="thumb-strip"></div>
  </div>

  <script>
  /* ══ CONFIG ══ */
  const REPO   = 'hutch7575/portfolio';
  const BRANCH = 'main';
  const API    = `https://api.github.com/repos/${REPO}/contents`;
  const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
  const IMG_EXT = ['jpg','jpeg','png','gif','webp','svg','avif'];
  const VID_EXT = ['mp4','webm','mov','ogg'];
  const getExt  = f => f.split('.').pop().toLowerCase();

  /* ══ CURSOR ══ */
  const cdot  = document.getElementById('cursor-dot');
  const cring = document.getElementById('cursor-ring');
  let mx=0, my=0, rx=0, ry=0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cdot.style.left  = mx+'px';
    cdot.style.top   = my+'px';
  });

  (function animRing() {
    rx += (mx-rx)*.1; ry += (my-ry)*.1;
    cring.style.left = rx+'px'; cring.style.top = ry+'px';
    requestAnimationFrame(animRing);
  })();

  document.addEventListener('mouseover', e => {
    const t = e.target;
    if (t.closest('.landing-card') || t.closest('button') || t.closest('.thumb'))
      document.body.classList.add('hovering');
    else document.body.classList.remove('hovering');
  });

  /* ══ DATA ══ */
  let imageFiles = [], videoFiles = [];

  async function loadFolder(folder) {
    try {
      const r = await fetch(`${API}/${folder}`);
      if (!r.ok) return [];
      const d = await r.json();
      return Array.isArray(d) ? d.filter(f => f.name !== '.gitkeep') : [];
    } catch { return []; }
  }

  async function init() {
    [imageFiles, videoFiles] = await Promise.all([
      loadFolder('images'), loadFolder('videos')
    ]);

    const imgs = imageFiles.filter(f => IMG_EXT.includes(getExt(f.name)));
    const vids = videoFiles.filter(f => VID_EXT.includes(getExt(f.name)));

    document.getElementById('count-images').textContent = `${imgs.length} file${imgs.length!==1?'s':''}`;
    document.getElementById('count-videos').textContent = `${vids.length} file${vids.length!==1?'s':''}`;

    // preview first image on card bg
    if (imgs.length) {
      const bg = document.getElementById('card-bg-images');
      bg.style.backgroundImage = `url(${RAW}/images/${imgs[0].name})`;
      bg.classList.remove('card-grad-a');
    }
    if (vids.length) {
      // can't preview vid easily, keep gradient
    }
  }

  /* ══ LANDING → GALLERY ══ */
  let currentType = 'images';
  let currentIndex = 0;
  let slides = [];
  let isAnimating = false;

  document.getElementById('card-images').addEventListener('click', () => openGallery('images'));
  document.getElementById('card-videos').addEventListener('click', () => openGallery('videos'));

  function openGallery(type) {
    currentType = type;
    currentIndex = 0;

    const files = type === 'images'
      ? imageFiles.filter(f => IMG_EXT.includes(getExt(f.name)))
      : videoFiles.filter(f => VID_EXT.includes(getExt(f.name)));

    document.getElementById('gallery-title').textContent = type === 'images' ? 'Images' : 'Videos';
    document.getElementById('landing').classList.add('out');
    document.getElementById('gallery').classList.add('active');

    buildCarousel(files, type);
  }

  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('landing').classList.remove('out');
    document.getElementById('gallery').classList.remove('active');
    // pause any playing videos
    document.querySelectorAll('#carousel video').forEach(v => v.pause());
  });

  /* ══ CAROUSEL ══ */
  function buildCarousel(files, type) {
    slides = files;
    const carousel = document.getElementById('carousel');
    const thumbStrip = document.getElementById('thumb-strip');
    const empty = document.getElementById('gallery-empty');
    carousel.innerHTML = '';
    thumbStrip.innerHTML = '';

    if (!files.length) {
      empty.classList.add('show');
      document.getElementById('empty-folder').textContent = type + '/';
      document.getElementById('prev-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      return;
    }

    empty.classList.remove('show');
    document.getElementById('prev-btn').style.display = '';
    document.getElementById('next-btn').style.display = '';

    files.forEach((file, i) => {
      const url = `${RAW}/${type}/${file.name}`;
      const isVid = VID_EXT.includes(getExt(file.name));

      // slide
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.style.left = (i * 100) + 'vw';

      const wrap = document.createElement('div');
      wrap.className = 'slide-media-wrap';

      if (isVid) {
        const v = document.createElement('video');
        v.src = url; v.loop = true; v.muted = true; v.playsInline = true;
        v.preload = 'metadata';
        wrap.appendChild(v);
      } else {
        const img = document.createElement('img');
        img.src = url; img.alt = file.name; img.loading = i === 0 ? 'eager' : 'lazy';
        wrap.appendChild(img);
      }

      const info = document.createElement('div');
      info.className = 'slide-info';
      info.innerHTML = `<span class="slide-name">${file.name}</span>`;

      slide.appendChild(wrap);
      slide.appendChild(info);
      carousel.appendChild(slide);

      // thumbnail
      const thumb = document.createElement('div');
      thumb.className = 'thumb' + (i===0?' active':'');
      if (isVid) {
        const tv = document.createElement('video');
        tv.src = url; tv.muted = true; tv.preload = 'metadata';
        thumb.appendChild(tv);
      } else {
        const ti = document.createElement('img');
        ti.src = url; ti.alt = '';
        thumb.appendChild(ti);
      }
      thumb.addEventListener('click', () => goTo(i));
      thumbStrip.appendChild(thumb);
    });

    goTo(0, true);
  }

  function goTo(idx, instant=false) {
    if (isAnimating && !instant) return;
    isAnimating = true;

    const prev = currentIndex;
    currentIndex = Math.max(0, Math.min(idx, slides.length-1));

    // pause prev video
    const prevSlide = document.querySelector(`.slide:nth-child(${prev+1})`);
    if (prevSlide) {
      const pv = prevSlide.querySelector('video');
      if (pv) pv.pause();
    }

    // move carousel
    const carousel = document.getElementById('carousel');
    carousel.style.transition = instant ? 'none' : 'transform .7s cubic-bezier(.16,1,.3,1)';
    carousel.style.transform = `translateX(${-currentIndex * 100}vw)`;

    // play current video
    setTimeout(() => {
      const curSlide = document.querySelector(`.slide:nth-child(${currentIndex+1})`);
      if (curSlide) {
        const cv = curSlide.querySelector('video');
        if (cv) cv.play();
      }
      isAnimating = false;
    }, instant ? 0 : 700);

    // update thumbs
    document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===currentIndex));

    // update counter
    document.getElementById('gallery-counter').textContent =
      String(currentIndex+1).padStart(2,'0') + ' / ' + String(slides.length).padStart(2,'0');

    // update progress
    document.getElementById('progress-bar').style.width =
      ((currentIndex+1)/slides.length*100) + '%';

    updateParallax(0);
  }

  document.getElementById('prev-btn').addEventListener('click', () => {
    goTo(currentIndex > 0 ? currentIndex-1 : slides.length-1);
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    goTo(currentIndex < slides.length-1 ? currentIndex+1 : 0);
  });

  /* keyboard */
  document.addEventListener('keydown', e => {
    if (!document.getElementById('gallery').classList.contains('active')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentIndex+1 < slides.length ? currentIndex+1 : 0);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentIndex > 0 ? currentIndex-1 : slides.length-1);
    if (e.key === 'Escape') document.getElementById('back-btn').click();
  });

  /* ══ PARALLAX ══ */
  let mouseX = 0;
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2; // -1 to 1
    updateParallax(mouseX);
  });

  function updateParallax(mx) {
    const allSlides = document.querySelectorAll('.slide');
    allSlides.forEach((slide, i) => {
      const media = slide.querySelector('img, video');
      if (!media) return;
      const offsetX = mx * 20;
      const offsetY = 0;
      media.style.transform = `translate(calc(-5% + ${offsetX}px), calc(-10% + ${offsetY}px))`;
    });
  }

  /* ══ SWIPE / DRAG ══ */
  let dragStart = null, dragging = false;

  document.getElementById('carousel').addEventListener('pointerdown', e => {
    dragStart = e.clientX;
    dragging = true;
  });

  document.addEventListener('pointermove', e => {
    if (!dragging || dragStart === null) return;
    const delta = e.clientX - dragStart;
    const carousel = document.getElementById('carousel');
    carousel.style.transition = 'none';
    carousel.style.transform = `translateX(calc(${-currentIndex * 100}vw + ${delta}px))`;
  });

  document.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    const delta = e.clientX - dragStart;
    dragStart = null;
    if (delta < -60) goTo(currentIndex+1 < slides.length ? currentIndex+1 : currentIndex);
    else if (delta > 60) goTo(currentIndex > 0 ? currentIndex-1 : 0);
    else goTo(currentIndex);
  });

  /* ══ BOOT ══ */
  init();
  </script>
</body>
</html>
