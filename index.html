<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Boot</title>

<style>
body {
    margin: 0;
    background: #120014;
    color: #ff7eb6;
    font-family: monospace;
    overflow: hidden;
}

#terminal {
    padding: 40px;
    white-space: pre-wrap;
    font-size: 14px;
}

.glow {
    color: #ff7eb6;
    text-shadow: 0 0 10px #ff4f9a;
}

a {
    color: #ff9cc8;
    text-decoration: none;
}
a:hover {
    text-shadow: 0 0 10px #ff7eb6;
}

.cursor {
    display: inline-block;
    width: 10px;
    background: #ff7eb6;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const lines = [
"booting portfolio system...",
"loading assets ████████",
"",
"██████╗  ██████╗ ██████╗ ████████╗ ██████╗ ██████╗ ██╗   ██╗",
"██╔══██╗██╔═══██╗██╔══██╗╚══██╔══╝██╔═══██╗██╔══██╗██║   ██║",
"██████╔╝██║   ██║██████╔╝   ██║   ██║   ██║██████╔╝██║   ██║",
"██╔═══╝ ██║   ██║██╔══██╗   ██║   ██║   ██║██╔══██╗██║   ██║",
"██║     ╚██████╔╝██║  ██║   ██║   ╚██████╔╝██║  ██║╚██████╔╝",
"╚═╝      ╚═════╝ ╚═╝  ╚═╝   ╚═╝    ╚═════╝ ╚═╝  ╚═╝ ╚═════╝",
"",
"> welcome, josh.",
"> initializing gallery modules...",
"",
"[1] open image gallery → images.html",
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine() {
    if (i < lines.length) {
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLine, 120);
    } else {
        terminal.innerHTML += "\n<a href='images.html'>[ enter gallery ]</a><span class='cursor'></span>";
    }
}

typeLine();
</script>

</body>
</html>
