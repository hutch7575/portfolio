<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Josh Walls — Graphic Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a;
      --surface:#141414;
      --surface2:#1a1a1a;
      --border:#222;
      --text:#f5f5f0;
      --muted:#4a4a4a;
      --muted2:#2e2e2e;
      --pink:#f72585;
      --pink-dim:rgba(247,37,133,0.12);
    }
    html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow:hidden;cursor:none}

    /* CURSOR */
    #cur{position:fixed;z-index:9999;pointer-events:none;left:0;top:0;transition:transform .15s cubic-bezier(.16,1,.3,1)}
    #cur svg{width:20px;height:20px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.9))}
    #cur.h{transform:scale(1.4)}
    #cur.c{transform:scale(.8)}

    /* NOISE */
    body::before{content:'';position:fixed;inset:0;z-index:9980;pointer-events:none;opacity:.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:180px}

    /* ══════════════════════
       PAGE SYSTEM
    ══════════════════════ */
    .page{position:fixed;inset:0;z-index:1;transition:opacity .5s ease,transform .5s cubic-bezier(.16,1,.3,1);overflow:hidden}
    .page.hidden{opacity:0;pointer-events:none;transform:translateY(12px)}

    /* ══════════════════════
       LANDING
    ══════════════════════ */
    #pg-landing{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr auto}

    /* LEFT — name + info */
    .land-left{
      grid-column:1;grid-row:1;
      display:flex;flex-direction:column;justify-content:space-between;
      padding:2.5rem;border-right:1px solid var(--border);
      position:relative;overflow:hidden;
    }
    .land-left-top{display:flex;flex-direction:column;gap:.5rem}
    .land-logo{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
    .land-year{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--pink)}

    .land-name{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(5rem,12vw,13rem);
      line-height:.88;letter-spacing:.01em;
      color:var(--text);
      margin-top:auto;margin-bottom:0;
    }
    .land-name span{color:var(--pink)}

    .land-left-bottom{
      display:flex;flex-direction:column;gap:1.25rem;
      padding-top:2rem;
    }
    .land-desc{font-size:.85rem;color:var(--muted);line-height:1.7;max-width:320px;font-weight:300}

    .land-tags{display:flex;gap:.5rem;flex-wrap:wrap}
    .land-tag{
      font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
      border:1px solid var(--border);color:var(--muted);padding:.28rem .6rem;border-radius:1px;
    }

    /* big ghost text behind name */
    .land-ghost{
      position:absolute;bottom:-2rem;left:-1rem;
      font-family:'Bebas Neue',sans-serif;font-size:28vw;line-height:1;
      color:var(--surface);pointer-events:none;user-select:none;z-index:0;
      letter-spacing:-.02em;
    }
    .land-left>*:not(.land-ghost){position:relative;z-index:1}

    /* RIGHT — category panels */
    .land-right{
      grid-column:2;grid-row:1;
      display:flex;flex-direction:column;
    }

    .cat-panel{
      flex:1;position:relative;overflow:hidden;
      display:flex;align-items:flex-end;padding:2.5rem;
      transition:flex .5s cubic-bezier(.16,1,.3,1);
    }
    .cat-panel:first-child{border-bottom:1px solid var(--border)}
    .cat-panel:hover{flex:1.5}

    .cat-panel-bg{
      position:absolute;inset:-8%;z-index:0;
      background-size:cover;background-position:center;
      filter:brightness(.15) saturate(.3);
      transition:filter .5s,transform .55s cubic-bezier(.16,1,.3,1);
    }
    .cat-panel:hover .cat-panel-bg{filter:brightness(.25) saturate(.5);transform:scale(1.04)}

    .cat-panel-grad{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(135deg,rgba(10,10,10,.8) 0%,transparent 60%),
                 linear-gradient(to top,rgba(10,10,10,.95) 0%,transparent 50%);
    }
    .cat-default-a{background:radial-gradient(ellipse at 60% 40%,rgba(247,37,133,.12) 0%,transparent 60%),var(--bg)}
    .cat-default-b{background:radial-gradient(ellipse at 40% 60%,rgba(247,37,133,.08) 0%,transparent 60%),var(--bg)}

    .cat-content{position:relative;z-index:2;display:flex;flex-direction:column;gap:.4rem}
    .cat-index{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--pink);margin-bottom:.2rem}
    .cat-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,5.5rem);letter-spacing:.02em;line-height:.9;color:var(--text);transition:color .3s}
    .cat-panel:hover .cat-title{color:var(--pink)}
    .cat-count{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.08em}
    .cat-arrow{font-size:1.2rem;color:var(--pink);opacity:0;transform:translateX(-6px);transition:opacity .25s,transform .25s;margin-top:.3rem}
    .cat-panel:hover .cat-arrow{opacity:1;transform:translateX(0)}

    /* FOOTER STRIP */
    .land-footer{
      grid-column:1/-1;grid-row:2;
      border-top:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
      padding:.85rem 2.5rem;
    }
    .land-footer-l,.land-footer-r{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .land-footer-r span{color:var(--pink)}

    /* ══════════════════════
       GALLERY PAGE
    ══════════════════════ */
    #pg-gallery{display:flex;flex-direction:column}

    /* gallery header */
    #gal-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:1.5rem 2.5rem;border-bottom:1px solid var(--border);
      flex-shrink:0;
      background:var(--bg);
    }
    #gal-back{background:none;border:none;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.5rem;transition:color .2s;padding:0}
    #gal-back:hover{color:var(--text)}
    #gal-back .arr{display:inline-block;transition:transform .2s}
    #gal-back:hover .arr{transform:translateX(-4px)}
    #gal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;color:var(--text)}
    #gal-counter{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--muted)}

    /* scrollable grid */
    #gal-scroll{flex:1;overflow-y:auto;padding:2rem 2.5rem 6rem;overscroll-behavior:contain}
    #gal-scroll::-webkit-scrollbar{width:3px}
    #gal-scroll::-webkit-scrollbar-track{background:transparent}
    #gal-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    #gal-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:1px;
      background:var(--border);
    }

    .gal-item{
      position:relative;background:var(--surface);overflow:hidden;
      aspect-ratio:4/3;
      transition:background .2s;
    }
    .gal-item img,.gal-item video{
      width:100%;height:100%;object-fit:cover;display:block;
      transition:transform .55s cubic-bezier(.16,1,.3,1),filter .4s;
      filter:saturate(.75) brightness(.9);
    }
    .gal-item:hover img,.gal-item:hover video{transform:scale(1.05);filter:saturate(1) brightness(1)}

    .gal-item-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(10,10,10,.85) 0%,transparent 50%);
      opacity:0;transition:opacity .3s;
      display:flex;flex-direction:column;justify-content:flex-end;padding:1rem 1.1rem;gap:.2rem;
    }
    .gal-item:hover .gal-item-overlay{opacity:1}
    .gal-item-name{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;color:rgba(245,245,240,.7);text-transform:uppercase}
    .gal-item-expand{font-size:.7rem;color:var(--pink);font-family:'DM Mono',monospace;letter-spacing:.1em}

    .gal-item-num{
      position:absolute;top:.6rem;left:.8rem;
      font-family:'Bebas Neue',sans-serif;font-size:1.1rem;
      color:rgba(245,245,240,.18);letter-spacing:.05em;
      transition:color .3s;
    }
    .gal-item:hover .gal-item-num{color:rgba(247,37,133,.5)}

    /* ══════════════════════
       LIGHTBOX
    ══════════════════════ */
    #lightbox{
      position:fixed;inset:0;z-index:500;
      background:rgba(10,10,10,.97);
      display:none;align-items:center;justify-content:center;
      flex-direction:column;gap:0;
      backdrop-filter:blur(4px);
    }
    #lightbox.open{display:flex}

    #lb-inner{
      position:relative;
      display:flex;flex-direction:column;align-items:center;
      max-width:90vw;max-height:88vh;
      animation:lbIn .3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes lbIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}

    #lb-inner img,#lb-inner video{
      max-width:90vw;max-height:80vh;
      object-fit:contain;display:block;border-radius:1px;
      box-shadow:0 40px 120px rgba(0,0,0,.9);
    }

    #lb-info{
      width:100%;display:flex;justify-content:space-between;align-items:flex-start;
      padding:1.25rem 0 0;gap:2rem;
    }
    #lb-desc{font-size:.85rem;color:rgba(245,245,240,.5);line-height:1.6;font-weight:300;max-width:480px}
    #lb-name{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:rgba(245,245,240,.25);white-space:nowrap;padding-top:.2rem}

    #lb-close{
      position:fixed;top:1.75rem;right:2rem;z-index:501;
      background:none;border:none;
      font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
      color:var(--muted);transition:color .2s;
    }
    #lb-close:hover{color:var(--text)}

    /* lb nav */
    .lb-nav{
      position:fixed;top:50%;transform:translateY(-50%);z-index:501;
      background:none;border:none;color:var(--muted);font-size:2rem;
      padding:1.5rem;transition:color .2s;
    }
    #lb-prev{left:.5rem}
    #lb-next{right:.5rem}
    .lb-nav:hover{color:var(--pink)}

    /* lb counter */
    #lb-counter{
      position:fixed;top:1.75rem;left:2rem;
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--muted);
    }

    /* lb progress */
    #lb-progress{position:fixed;bottom:0;left:0;height:1px;background:var(--pink);transition:width .3s ease;z-index:502}

    /* empty */
    .gal-empty{padding:6rem 2rem;text-align:center;font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.1em;color:var(--muted);grid-column:1/-1}
    .gal-empty span{color:var(--pink)}

    /* SCROLLBAR STYLE */
    *{scrollbar-width:thin;scrollbar-color:var(--border) transparent}

    @media(max-width:700px){
      #pg-landing{grid-template-columns:1fr;grid-template-rows:auto auto auto}
      .land-left{grid-column:1;grid-row:1;border-right:none;border-bottom:1px solid var(--border);padding:1.5rem}
      .land-right{grid-column:1;grid-row:2;min-height:45vh}
      .cat-panel{padding:1.5rem}
      .land-footer{grid-row:3;padding:.75rem 1.5rem}
      #gal-header{padding:1.25rem 1.5rem}
      #gal-scroll{padding:1.25rem 1rem 5rem}
      #gal-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
    }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>

<div id="cur">
  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3.5 2L17 9.8L10.8 11.4L7.8 18.5L3.5 2Z" fill="white" stroke="#0a0a0a" stroke-width="1.1" stroke-linejoin="round"/>
  </svg>
</div>

<!-- ══ LANDING ══ -->
<div class="page" id="pg-landing">

  <div class="land-left">
    <div class="land-ghost" aria-hidden="true">JW</div>
    <div class="land-left-top">
      <span class="land-logo">Portfolio</span>
      <span class="land-year">Est. 2026</span>
    </div>

    <h1 class="land-name">Josh<br>Walls<span>.</span></h1>

    <div class="land-left-bottom">
      <p class="land-desc">Graphic designer focused on branding, packaging, print and visual identity. Based in the UK.</p>
      <div class="land-tags">
        <span class="land-tag">Branding</span>
        <span class="land-tag">Packaging</span>
        <span class="land-tag">Print</span>
        <span class="land-tag">Typography</span>
        <span class="land-tag">Identity</span>
      </div>
    </div>
  </div>

  <div class="land-right">
    <div class="cat-panel" id="btn-images">
      <div class="cat-panel-bg cat-default-a" id="preview-images"></div>
      <div class="cat-panel-grad"></div>
      <div class="cat-content">
        <span class="cat-index">01 —</span>
        <h2 class="cat-title">Images</h2>
        <span class="cat-count" id="count-images">Loading…</span>
        <span class="cat-arrow">→</span>
      </div>
    </div>
    <div class="cat-panel" id="btn-videos">
      <div class="cat-panel-bg cat-default-b" id="preview-videos"></div>
      <div class="cat-panel-grad"></div>
      <div class="cat-content">
        <span class="cat-index">02 —</span>
        <h2 class="cat-title">Videos</h2>
        <span class="cat-count" id="count-videos">Loading…</span>
        <span class="cat-arrow">→</span>
      </div>
    </div>
  </div>

  <div class="land-footer">
    <span class="land-footer-l">© 2026 Josh Walls</span>
    <span class="land-footer-r">Built with <span>Claude</span> · Anthropic</span>
  </div>

</div>

<!-- ══ GALLERY ══ -->
<div class="page hidden" id="pg-gallery">
  <div id="gal-header">
    <button id="gal-back"><span class="arr">←</span> Back</button>
    <span id="gal-title">Images</span>
    <span id="gal-counter"></span>
  </div>
  <div id="gal-scroll">
    <div id="gal-grid"></div>
  </div>
</div>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox">
  <span id="lb-counter"></span>
  <button id="lb-close">[ Close ]</button>
  <div id="lb-inner">
    <div id="lb-media"></div>
    <div id="lb-info">
      <p id="lb-desc"></p>
      <span id="lb-name"></span>
    </div>
  </div>
  <button class="lb-nav" id="lb-prev">‹</button>
  <button class="lb-nav" id="lb-next">›</button>
  <div id="lb-progress"></div>
</div>

<script>
/* ── CONFIG ── */
const REPO    = 'hutch7575/portfolio';
const BRANCH  = 'main';
const API     = `https://api.github.com/repos/${REPO}/contents`;
const RAW     = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const IMG_EXT = ['jpg','jpeg','png','gif','webp','avif'];
const VID_EXT = ['mp4','webm','mov','ogg'];
const ext     = f => f.split('.').pop().toLowerCase();

/* ── CURSOR ── */
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });
document.addEventListener('mouseover', e => cur.classList.toggle('h', !!e.target.closest('button,.cat-panel,.gal-item')));
document.addEventListener('mousedown', () => cur.classList.add('c'));
document.addEventListener('mouseup',   () => cur.classList.remove('c'));

/* ── PAGE NAV ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('hidden', p.id !== id));
}

/* ── DATA ── */
let imageFiles=[], videoFiles=[], descriptions={}, currentFiles=[], currentType='images', lbIndex=0;

async function loadFolder(folder) {
  try {
    const r = await fetch(`${API}/${folder}`);
    if (!r.ok) return [];
    const d = await r.json();
    return Array.isArray(d) ? d.filter(f=>f.name!=='.gitkeep') : [];
  } catch { return []; }
}

async function loadDescriptions() {
  try {
    const r = await fetch(`${RAW}/descriptions.json?t=${Date.now()}`);
    if (r.ok) descriptions = await r.json();
  } catch {}
}

async function init() {
  await loadDescriptions();
  [imageFiles, videoFiles] = await Promise.all([loadFolder('images'), loadFolder('videos')]);

  const imgs = imageFiles.filter(f=>IMG_EXT.includes(ext(f.name)));
  const vids = videoFiles.filter(f=>VID_EXT.includes(ext(f.name)));

  document.getElementById('count-images').textContent = `${imgs.length} piece${imgs.length!==1?'s':''}`;
  document.getElementById('count-videos').textContent = `${vids.length} piece${vids.length!==1?'s':''}`;

  if (imgs.length) {
    const el = document.getElementById('preview-images');
    el.style.backgroundImage = `url(${RAW}/images/${imgs[0].name})`;
    el.className = 'cat-panel-bg';
  }
  if (vids.length) {
    const el = document.getElementById('preview-videos');
    el.style.backgroundImage = `url(${RAW}/videos/${vids[0].name})`;
    el.className = 'cat-panel-bg';
  }
}

/* ── GALLERY ── */
document.getElementById('btn-images').addEventListener('click', () => openGallery('images'));
document.getElementById('btn-videos').addEventListener('click', () => openGallery('videos'));
document.getElementById('gal-back').addEventListener('click', () => showPage('pg-landing'));

function openGallery(type) {
  currentType = type;
  currentFiles = type==='images'
    ? imageFiles.filter(f=>IMG_EXT.includes(ext(f.name)))
    : videoFiles.filter(f=>VID_EXT.includes(ext(f.name)));

  document.getElementById('gal-title').textContent = type==='images' ? 'Images' : 'Videos';
  document.getElementById('gal-counter').textContent = `${currentFiles.length} piece${currentFiles.length!==1?'s':''}`;

  buildGrid();
  showPage('pg-gallery');
  document.getElementById('gal-scroll').scrollTop = 0;
}

function buildGrid() {
  const grid = document.getElementById('gal-grid');
  grid.innerHTML = '';

  if (!currentFiles.length) {
    grid.innerHTML = `<div class="gal-empty">Nothing here yet.<br>Add files to <span>${currentType}/</span></div>`;
    return;
  }

  currentFiles.forEach((file, i) => {
    const url   = `${RAW}/${currentType}/${file.name}`;
    const isVid = VID_EXT.includes(ext(file.name));
    const num   = String(i+1).padStart(2,'0');

    const item = document.createElement('div');
    item.className = 'gal-item';

    let mediaEl;
    if (isVid) {
      mediaEl = document.createElement('video');
      mediaEl.src=url; mediaEl.muted=true; mediaEl.loop=true; mediaEl.playsInline=true; mediaEl.preload='metadata';
      item.addEventListener('mouseenter', ()=>mediaEl.play());
      item.addEventListener('mouseleave', ()=>{ mediaEl.pause(); mediaEl.currentTime=0; });
    } else {
      mediaEl = document.createElement('img');
      mediaEl.src=url; mediaEl.alt=file.name; mediaEl.loading=i<6?'eager':'lazy'; mediaEl.draggable=false;
    }

    const numEl = document.createElement('span');
    numEl.className='gal-item-num'; numEl.textContent=num;

    const overlay = document.createElement('div');
    overlay.className='gal-item-overlay';
    overlay.innerHTML=`<span class="gal-item-name">${file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ')}</span><span class="gal-item-expand">View →</span>`;

    item.appendChild(mediaEl); item.appendChild(numEl); item.appendChild(overlay);
    item.addEventListener('click', ()=>openLightbox(i));
    grid.appendChild(item);
  });
}

/* ── LIGHTBOX ── */
function openLightbox(idx) {
  lbIndex = idx;
  renderLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  const media = document.querySelector('#lb-media img, #lb-media video');
  if (media && media.tagName==='VIDEO') media.pause();
  document.body.style.overflow='';
}

function renderLb() {
  const file  = currentFiles[lbIndex];
  const url   = `${RAW}/${currentType}/${file.name}`;
  const isVid = VID_EXT.includes(ext(file.name));
  const desc  = descriptions[file.name] || '';

  const mediaDiv = document.getElementById('lb-media');
  // pause any playing video
  const prev = mediaDiv.querySelector('video');
  if (prev) prev.pause();

  if (isVid) {
    mediaDiv.innerHTML=`<video src="${url}" controls autoplay loop muted playsinline></video>`;
  } else {
    mediaDiv.innerHTML=`<img src="${url}" alt="${file.name}" draggable="false">`;
  }

  document.getElementById('lb-desc').textContent  = desc;
  document.getElementById('lb-name').textContent  = file.name;
  document.getElementById('lb-counter').textContent = `${String(lbIndex+1).padStart(2,'0')} / ${String(currentFiles.length).padStart(2,'0')}`;
  document.getElementById('lb-progress').style.width = ((lbIndex+1)/currentFiles.length*100)+'%';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', ()=>{ lbIndex=(lbIndex-1+currentFiles.length)%currentFiles.length; renderLb(); });
document.getElementById('lb-next').addEventListener('click', ()=>{ lbIndex=(lbIndex+1)%currentFiles.length; renderLb(); });
document.getElementById('lightbox').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeLightbox(); });

document.addEventListener('keydown', e=>{
  if (document.getElementById('lightbox').classList.contains('open')) {
    if(e.key==='ArrowRight') { lbIndex=(lbIndex+1)%currentFiles.length; renderLb(); }
    if(e.key==='ArrowLeft')  { lbIndex=(lbIndex-1+currentFiles.length)%currentFiles.length; renderLb(); }
    if(e.key==='Escape') closeLightbox();
    return;
  }
  if(!document.getElementById('pg-gallery').classList.contains('hidden')&&e.key==='Escape') showPage('pg-landing');
});

init();
</script>
</body>
</html>
