<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Josh Walls — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME TOKENS ── */
[data-theme="dark"]{
  --wall:#1c1c1e;
  --wall2:#2a2a2c;
  --wall3:#3a3a3c;
  --text:#e8e8ea;
  --text2:#a0a0a8;
  --text3:#606068;
  --border:rgba(255,255,255,.08);
  --shadow:rgba(0,0,0,.7);
  --light-tint:rgba(255,248,220,.06);
  --light-beam:rgba(255,240,170,.08);
  --frame-bg:#252528;
  --info-bg:#1c1c1e;
  --bg-main:#111113;
  --pink:#f72585;
}
[data-theme="light"]{
  --wall:#e8e6e1;
  --wall2:#d8d5cf;
  --wall3:#c8c4bc;
  --text:#1a1a1c;
  --text2:#555560;
  --text3:#999;
  --border:rgba(0,0,0,.1);
  --shadow:rgba(0,0,0,.25);
  --light-tint:rgba(255,248,220,.45);
  --light-beam:rgba(255,240,170,.35);
  --frame-bg:#fff;
  --info-bg:#f0ede8;
  --bg-main:#ccc9c2;
  --pink:#f72585;
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-main);color:var(--text);font-family:'Space Grotesk',sans-serif;transition:background .35s,color .35s}

/* NOISE */
#noise{position:fixed;inset:0;z-index:9800;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .55s ease}
.screen.on{opacity:1;pointer-events:all}

/* ═══════════════════════════════
   CATEGORY / LANDING
═══════════════════════════════ */
#sc-cat{
  z-index:80;
  background:var(--bg-main);
  overflow:hidden;
  transition:background .35s;
}

/* ceiling with rail */
.cat-ceiling{position:absolute;top:0;left:0;right:0;height:70px;background:linear-gradient(to bottom,rgba(0,0,0,.3),transparent);z-index:3;transition:background .35s}
[data-theme="light"] .cat-ceiling{background:linear-gradient(to bottom,rgba(0,0,0,.08),transparent)}
.cat-rail{position:absolute;top:20px;left:6%;right:6%;height:7px;border-radius:4px;background:linear-gradient(to bottom,rgba(255,255,255,.12),rgba(255,255,255,.04));box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05)}

/* header */
.cat-header{position:absolute;top:0;left:0;right:0;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;z-index:10}
.cat-logo{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text3)}
.cat-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;color:var(--text3)}

/* theme toggle */
#theme-toggle{
  background:none;border:1px solid var(--border);
  border-radius:20px;padding:.3rem .75rem;
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text3);transition:color .2s,border-color .2s,background .35s;
  display:flex;align-items:center;gap:.45rem;
}
#theme-toggle:hover{color:var(--text);border-color:var(--text3)}
#theme-toggle .icon{font-size:.8rem;line-height:1}

/* spotlight canvases */
#cat-cone-canvas{position:absolute;inset:0;z-index:1;pointer-events:none}
#cat-dust{position:absolute;inset:0;z-index:2;pointer-events:none}

/* floor */
.cat-floor{position:absolute;bottom:0;left:0;right:0;height:28%;z-index:0;background:linear-gradient(to top,rgba(0,0,0,.2),transparent)}
[data-theme="light"] .cat-floor{background:linear-gradient(to top,rgba(0,0,0,.06),transparent)}

/* fixture heads */
.cat-fix{position:absolute;top:56px;z-index:5;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%)}
.cat-fix-arm{width:3px;height:16px;background:rgba(255,255,255,.1)}
.cat-fix-head{width:40px;height:28px;border-radius:5px 5px 11px 11px;background:linear-gradient(to bottom,rgba(255,255,255,.12),rgba(255,255,255,.04));box-shadow:0 2px 6px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06)}

/* spotlight zones */
.cat-zone{
  position:absolute;z-index:3;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:9%;transform:translateX(-50%);
  transition:transform .35s cubic-bezier(.16,1,.3,1);
}
.cat-zone:hover{transform:translateX(-50%) scale(1.015)}

.cat-zone-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3.5rem,7vw,7.5rem);
  letter-spacing:.06em;line-height:1;
  color:var(--text);
  text-align:center;
  transition:color .25s;
}
.cat-zone:hover .cat-zone-title{color:#fff}
[data-theme="light"] .cat-zone:hover .cat-zone-title{color:#111}

.cat-zone-sub{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);text-align:center;margin-top:.5rem;transition:color .25s}
.cat-zone:hover .cat-zone-sub{color:var(--pink)}
.cat-zone-arrow{font-size:.9rem;color:var(--pink);margin-top:.55rem;opacity:0;transform:translateY(5px);transition:opacity .25s,transform .25s}
.cat-zone:hover .cat-zone-arrow{opacity:1;transform:translateY(0)}

/* vertical divider */
.cat-div{position:absolute;top:70px;bottom:0;left:50%;width:1px;background:linear-gradient(to bottom,transparent,var(--border) 30%,var(--border) 70%,transparent);z-index:4;pointer-events:none}

/* footer */
.cat-footer{position:absolute;bottom:0;left:0;right:0;padding:.85rem 2.5rem;z-index:10;display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);border-top:1px solid var(--border)}
.cat-footer span{color:var(--pink)}

/* ═══════════════════════════════
   IMAGE GALLERY — WALL
═══════════════════════════════ */
#sc-gallery{
  z-index:70;
  background:var(--wall);
  overflow:hidden;
  transition:background .35s;
}
/* subtle wall texture */
#sc-gallery::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(ellipse at 15% 50%,rgba(0,0,0,.04) 0%,transparent 55%),radial-gradient(ellipse at 85% 50%,rgba(0,0,0,.04) 0%,transparent 55%)}
[data-theme="light"] #sc-gallery::before{background-image:radial-gradient(ellipse at 15% 50%,rgba(0,0,0,.06) 0%,transparent 55%),radial-gradient(ellipse at 85% 50%,rgba(0,0,0,.06) 0%,transparent 55%)}

/* moving spotlight on the wall */
#wall-spot{
  position:absolute;z-index:1;pointer-events:none;
  width:800px;height:800px;border-radius:50%;
  background:radial-gradient(circle,var(--light-beam) 0%,var(--light-tint) 35%,transparent 70%);
  transform:translate(-50%,-50%);
  transition:left .72s cubic-bezier(.16,1,.3,1),top .6s cubic-bezier(.16,1,.3,1),opacity .4s;
  mix-blend-mode:screen;
}
[data-theme="light"] #wall-spot{mix-blend-mode:multiply}

/* edge darkening */
#sc-gallery::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to right,var(--wall2) 0%,transparent 14%,transparent 86%,var(--wall2) 100%)}

/* header */
#gal-bar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;background:linear-gradient(to bottom,var(--wall) 0%,transparent 100%);transition:background .35s}
#gal-back{background:none;border:none;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:.5rem;transition:color .2s;padding:0}
#gal-back:hover{color:var(--text)}
#gal-back .arr{display:inline-block;transition:transform .2s}
#gal-back:hover .arr{transform:translateX(-4px)}
#gal-title-bar{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--text2)}
#gal-ctr{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--text3)}

/* wall track */
#gal-wall{
  position:absolute;inset:0;z-index:3;
  display:flex;align-items:center;
  padding:0 16vw;gap:8vw;
  will-change:transform;
  transition:transform .78s cubic-bezier(.16,1,.3,1);
}

/* frame */
.pic-frame{
  flex-shrink:0;position:relative;
  transition:transform .45s cubic-bezier(.16,1,.3,1),filter .45s;
  will-change:transform;
}
.pic-frame.dimmed{filter:brightness(.55) saturate(.6)}
.pic-frame.active{filter:brightness(1) saturate(1)}

/* the mount (replaces gold border) */
.pic-mount{
  background:var(--frame-bg);
  padding:18px 18px 54px;
  box-shadow:0 20px 60px var(--shadow),0 4px 16px rgba(0,0,0,.3),0 0 0 1px var(--border);
  position:relative;
  transition:background .35s,box-shadow .35s;
}
.pic-mount::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
[data-theme="light"] .pic-mount::after{box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}

.pic-img{display:block;max-height:58vh;max-width:54vw;width:auto;height:auto;object-fit:contain;vertical-align:top}

/* caption strip at bottom of mount */
.pic-mount-label{
  position:absolute;bottom:0;left:0;right:0;height:46px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  border-top:1px solid var(--border);
}
.pic-mount-title{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.pic-mount-num{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.08em;color:var(--text3);opacity:.5}

/* ── HOLD / LIFT INTERACTION ── */
.pic-frame.lifting{
  transform:translateY(-32px) scale(1.025);
  z-index:20;
  filter:brightness(1) saturate(1) !important;
}
.pic-frame.lifting .pic-mount{
  box-shadow:0 40px 120px var(--shadow),0 12px 40px rgba(0,0,0,.4),0 0 0 1px var(--border);
}

/* hold progress ring */
.hold-ring{
  position:absolute;inset:-10px;border-radius:3px;pointer-events:none;z-index:30;
  opacity:0;transition:opacity .15s;
}
.hold-ring canvas{position:absolute;inset:0;width:100%;height:100%}
.pic-frame.holding .hold-ring{opacity:1}

/* info panel that slides up from bottom of frame */
.pic-info-panel{
  position:absolute;bottom:46px;left:0;right:0;z-index:25;
  background:var(--info-bg);
  border-top:1px solid var(--border);
  padding:1.1rem 1.25rem;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .3s;
  opacity:0;
  pointer-events:none;
}
.pic-frame.lifted .pic-info-panel{transform:translateY(0);opacity:1;pointer-events:all}
.pic-info-desc{font-size:.78rem;color:var(--text2);line-height:1.65;font-weight:300;margin-bottom:.5rem}
.pic-info-empty{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:var(--text3);font-style:italic}

/* nav */
.gal-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:50;background:none;border:none;font-size:2rem;color:var(--text3);padding:1.25rem;transition:color .2s}
#gal-prev{left:.5rem}
#gal-next{right:.5rem}
.gal-nav:hover{color:var(--pink)}
#gal-prev:hover{transform:translateY(-50%) translateX(-3px)}
#gal-next:hover{transform:translateY(-50%) translateX(3px)}

/* progress */
#gal-prog{position:fixed;bottom:0;left:0;height:2px;background:var(--pink);z-index:50;transition:width .4s ease}

/* ═══════════════════════════════
   VIDEO — GALLERY STYLE
═══════════════════════════════ */
#sc-tv{
  z-index:70;
  background:var(--wall);
  overflow:hidden;
  transition:background .35s;
}
#sc-tv::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(ellipse at 15% 50%,rgba(0,0,0,.04) 0%,transparent 55%),radial-gradient(ellipse at 85% 50%,rgba(0,0,0,.04) 0%,transparent 55%)}
#sc-tv::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to right,var(--wall2) 0%,transparent 14%,transparent 86%,var(--wall2) 100%)}

/* video spotlight */
#vid-spot{
  position:absolute;z-index:1;pointer-events:none;
  width:900px;height:900px;border-radius:50%;
  top:50%;left:50%;
  background:radial-gradient(circle,var(--light-beam) 0%,var(--light-tint) 35%,transparent 70%);
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  transition:opacity .4s;
}
[data-theme="light"] #vid-spot{mix-blend-mode:multiply}

/* tv header */
#tv-bar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;background:linear-gradient(to bottom,var(--wall) 0%,transparent 100%);transition:background .35s}
#tv-back{background:none;border:none;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:.5rem;transition:color .2s;padding:0}
#tv-back:hover{color:var(--text)}
#tv-back .arr{display:inline-block;transition:transform .2s}
#tv-back:hover .arr{transform:translateX(-4px)}
#tv-title-bar{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--text2)}
#tv-ctr{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--text3)}

/* video wall track */
#vid-wall{
  position:absolute;inset:0;z-index:3;
  display:flex;align-items:center;
  padding:0 16vw;gap:8vw;
  will-change:transform;
  transition:transform .78s cubic-bezier(.16,1,.3,1);
}

/* video frame — same mount as image */
.vid-frame{
  flex-shrink:0;position:relative;
  transition:transform .45s cubic-bezier(.16,1,.3,1),filter .45s;
}
.vid-frame.dimmed{filter:brightness(.55) saturate(.6)}
.vid-frame.active{filter:brightness(1) saturate(1)}

.vid-mount{
  background:var(--frame-bg);
  padding:12px 12px 46px;
  box-shadow:0 20px 60px var(--shadow),0 4px 16px rgba(0,0,0,.3),0 0 0 1px var(--border);
  position:relative;
  transition:background .35s;
}

/* video element inside mount */
.vid-el{
  display:block;
  width:min(68vw,900px);
  height:min(42vw,560px);
  object-fit:contain;
  background:#000;
}

/* scanlines overlay on video */
.vid-scanlines{
  position:absolute;top:12px;left:12px;right:12px;bottom:46px;
  pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0px,rgba(0,0,0,.12) 1px,transparent 1px,transparent 4px);
  opacity:.5;
}
[data-theme="light"] .vid-scanlines{opacity:.15}

/* static canvas */
.vid-static-canvas{position:absolute;top:12px;left:12px;right:12px;bottom:46px;z-index:8;pointer-events:none;opacity:0}

.vid-mount-label{position:absolute;bottom:0;left:0;right:0;height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-top:1px solid var(--border)}
.vid-mount-ch{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--pink)}
.vid-mount-name{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.08em;color:var(--text3);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* click hint */
#vid-click-hint{position:fixed;bottom:3rem;left:50%;transform:translateX(-50%);z-index:50;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);opacity:0;transition:opacity .4s;pointer-events:none;text-align:center}
#vid-click-hint.show{opacity:1}

/* empty */
.vid-empty-msg{position:absolute;inset:0;z-index:10;display:none;align-items:center;justify-content:center;flex-direction:column;gap:.8rem}
.vid-empty-msg.show{display:flex}
.vid-empty-msg p{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;color:var(--text3);text-align:center;line-height:1.9}
.vid-empty-msg span{color:var(--pink)}

/* vid nav */
.vid-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:50;background:none;border:none;font-size:2rem;color:var(--text3);padding:1.25rem;transition:color .2s}
#vid-prev{left:.5rem}
#vid-next{right:.5rem}
.vid-nav:hover{color:var(--pink)}
#vid-prev:hover{transform:translateY(-50%) translateX(-3px)}
#vid-next:hover{transform:translateY(-50%) translateX(3px)}
#vid-prog{position:fixed;bottom:0;left:0;height:2px;background:var(--pink);z-index:50;transition:width .4s ease}

@media(max-width:640px){
  .pic-img{max-height:52vh;max-width:78vw}
  #gal-wall,#vid-wall{padding:0 6vw;gap:10vw}
  .cat-header{padding:0 1.5rem}
  .cat-footer{padding:.75rem 1.5rem}
  #gal-bar,#tv-bar{padding:1.25rem 1.5rem}
  .vid-el{width:90vw;height:56vw}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="noise"></div>

<!-- ═══ CATEGORY LANDING ═══ -->
<div class="screen on" id="sc-cat">
  <div class="cat-ceiling"><div class="cat-rail"></div></div>
  <div class="cat-header">
    <span class="cat-logo">Portfolio</span>
    <span class="cat-name">Josh Walls</span>
    <button id="theme-toggle"><span class="icon">☽</span><span id="theme-label">Light</span></button>
  </div>

  <canvas id="cat-cone-canvas"></canvas>
  <canvas id="cat-dust"></canvas>

  <div class="cat-fix" style="left:30%"><div class="cat-fix-arm"></div><div class="cat-fix-head"></div></div>
  <div class="cat-fix" style="left:70%"><div class="cat-fix-arm"></div><div class="cat-fix-head"></div></div>

  <div class="cat-zone" id="zone-img" style="left:30%;top:70px;bottom:0;width:38%">
    <div class="cat-zone-title">Images</div>
    <div class="cat-zone-sub" id="cat-img-count">Loading…</div>
    <div class="cat-zone-arrow">↓ Enter</div>
  </div>

  <div class="cat-div"></div>

  <div class="cat-zone" id="zone-vid" style="left:70%;top:70px;bottom:0;width:38%">
    <div class="cat-zone-title">Videos</div>
    <div class="cat-zone-sub" id="cat-vid-count">Loading…</div>
    <div class="cat-zone-arrow">↓ Enter</div>
  </div>

  <div class="cat-floor"></div>
  <div class="cat-footer">
    <span>© 2026 Josh Walls · Graphic Design</span>
    <span>Built with <span>Claude</span> · Anthropic</span>
  </div>
</div>

<!-- ═══ IMAGE GALLERY ═══ -->
<div class="screen" id="sc-gallery">
  <div id="wall-spot"></div>
  <div id="gal-bar">
    <button id="gal-back"><span class="arr">←</span> Back</button>
    <span id="gal-title-bar">Images</span>
    <span id="gal-ctr"></span>
  </div>
  <div id="gal-wall"></div>
  <button class="gal-nav" id="gal-prev">‹</button>
  <button class="gal-nav" id="gal-next">›</button>
  <div id="gal-prog"></div>
</div>

<!-- ═══ VIDEO GALLERY ═══ -->
<div class="screen" id="sc-tv">
  <div id="vid-spot"></div>
  <div id="tv-bar">
    <button id="tv-back"><span class="arr">←</span> Back</button>
    <span id="tv-title-bar">Videos</span>
    <span id="tv-ctr"></span>
  </div>
  <div id="vid-wall"></div>
  <button class="vid-nav" id="vid-prev">‹</button>
  <button class="vid-nav" id="vid-next">›</button>
  <div id="vid-prog"></div>
  <div id="vid-click-hint">Click video to change channel</div>
</div>

<script>
/* ══ AUDIO ══ */
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC}
function playTone(freq,dur,vol=.15,type='sine',delay=0){
  const ac=getAC();const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=type;
  o.frequency.setValueAtTime(freq,ac.currentTime+delay);
  g.gain.setValueAtTime(0,ac.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+.01);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur);
}
function playNoise(dur,vol=.2,hipass=800){
  const ac=getAC();
  const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
  s.buffer=buf;f.type='highpass';f.frequency.value=hipass;
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
  s.connect(f);f.connect(g);g.connect(ac.destination);s.start();
}
function playWhoosh(){playNoise(.2,.1,400);playTone(200,.2,.04,'sine')}
function playLift(){playTone(320,.25,.07,'sine');playTone(480,.18,.04,'sine',.05)}
function playHoldTick(){playTone(440,.05,.06,'square')}
function playHoldReady(){playTone(520,.15,.1,'sine');playTone(780,.1,.06,'sine',.08)}
function playStaticBurst(){playNoise(.18,.28,1200)}
function playSlide(){playNoise(.12,.05,600);playTone(180,.18,.03,'sine')}

const RAW=`https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const IMG_EXT=['jpg','jpeg','png','gif','webp','avif'];
const VID_EXT=['mp4','webm','mov','ogg'];
const xExt=f=>f.split('.').pop().toLowerCase();
let imgFiles=[],vidFiles=[],descs={};

async function loadData(){
  const [a,b,c]=await Promise.all([
    fetch(`${API}/images`).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(`${API}/videos`).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(`${RAW}/descriptions.json?t=${Date.now()}`).then(r=>r.ok?r.json():{}).catch(()=>({}))
  ]);
  imgFiles=a.filter(f=>f.name&&f.name!=='.gitkeep'&&IMG_EXT.includes(xExt(f.name)));
  vidFiles=b.filter(f=>f.name&&f.name!=='.gitkeep'&&VID_EXT.includes(xExt(f.name)));

/* ══ CAT SPOTLIGHT ══ */
function drawCatCones(){
  const c=document.getElementById('cat-cone-canvas');
  const W=window.innerWidth,H=window.innerHeight;
  c.width=W;c.height=H;c.style.cssText='position:absolute;inset:0;z-index:1;pointer-events:none';
  const ctx=c.getContext('2d');
  const isDark=theme==='dark';
  const alpha=isDark?.08:.25;
  drawOneCone(ctx,W*.3,70,W*.2,H,alpha);
  drawOneCone(ctx,W*.7,70,W*.2,H,alpha);
}
function drawOneCone(ctx,tx,ty,hw,H,a){
  const g=ctx.createLinearGradient(tx,ty,tx,H*.8);
  g.addColorStop(0,`rgba(255,240,170,0)`);
  g.addColorStop(.3,`rgba(255,240,170,${a*.5})`);
  g.addColorStop(.7,`rgba(255,240,170,${a})`);
  g.addColorStop(1,`rgba(255,240,170,0)`);
  ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx-hw,H*.88);ctx.lineTo(tx+hw,H*.88);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  const pool=ctx.createRadialGradient(tx,H*.82,0,tx,H*.82,hw*.7);
  pool.addColorStop(0,`rgba(255,240,170,${a*1.2})`);pool.addColorStop(1,`rgba(255,240,170,0)`);
  ctx.beginPath();ctx.ellipse(tx,H*.82,hw*.7,hw*.14,0,0,Math.PI*2);ctx.fillStyle=pool;ctx.fill();
}

/* dust */
let dustP=[];
function startDust(){
  const c=document.getElementById('cat-dust');
  const W=window.innerWidth,H=window.innerHeight;
  c.width=W;c.height=H;c.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:2';
  dustP=[];
  for(let i=0;i<70;i++)dustP.push({x:W*(.1+Math.random()*.8),y:H*(.05+Math.random()*.8),vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.1,r:Math.random()*1.2+.2,a:Math.random()*.3+.04});
  animDust(c);
}
function animDust(c){
  if(!document.getElementById('sc-cat').classList.contains('on'))return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  const isDark=theme==='dark';
  dustP.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<W*.06||p.x>W*.94)p.vx*=-1;
    if(p.y<H*.03||p.y>H*.9)p.vy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=isDark?`rgba(255,240,180,${p.a})`:`rgba(180,160,100,${p.a*.6})`;
    ctx.fill();
  });
  requestAnimationFrame(()=>animDust(c));
}

window.addEventListener('load',()=>{drawCatCones();startDust()});
window.addEventListener('resize',()=>{drawCatCones()});

/* ══ IMAGE GALLERY ══ */
let galIdx=0,galLifted=null,holdTimer=null,holdStarted=false;

function openGallery(){
  buildWall();
  showScreen('sc-gallery');
  setTimeout(()=>moveWallSpot(galIdx,true),120);
}

function buildWall(){
  const wall=document.getElementById('gal-wall');
  const thumbs=document.getElementById('cat-thumbs');
  wall.innerHTML='';galIdx=0;

  imgFiles.forEach((file,i)=>{
    const url=`${RAW}/images/${file.name}`;
    const frame=document.createElement('div');
    frame.className='pic-frame'+(i===0?' active':' dimmed');
    frame.setAttribute('data-idx',i);

    // hold ring canvas
    const ring=document.createElement('div');ring.className='hold-ring';
    const rc=document.createElement('canvas');ring.appendChild(rc);frame.appendChild(ring);

    const mount=document.createElement('div');mount.className='pic-mount';
    const img=document.createElement('img');
    img.className='pic-img';img.src=url;img.alt=file.name;
    img.loading=i===0?'eager':'lazy';img.draggable=false;
    mount.appendChild(img);

    // info panel
    const panel=document.createElement('div');panel.className='pic-info-panel';
    const desc=descs[file.name]||'';
    panel.innerHTML=desc
      ?`<p class="pic-info-desc">${desc}</p>`
      :`<p class="pic-info-empty">No description yet.</p>`;

    // label strip
    const label=document.createElement('div');label.className='pic-mount-label';
    label.innerHTML=`<span class="pic-mount-title">${file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ')}</span><span class="pic-mount-num">${String(i+1).padStart(2,'0')}</span>`;

    mount.appendChild(panel);mount.appendChild(label);
    frame.appendChild(mount);

    // hold interaction
    setupHold(frame,i);
    frame.addEventListener('click',e=>{
      if(holdStarted)return;
      if(i!==galIdx)galGoTo(i);
    });

    wall.appendChild(frame);
  });

  galGoTo(0,true);
}

function setupHold(frame,idx){
  let prog=0,raf=null,startT=null;

  function startHold(e){
    if(idx!==galIdx){galGoTo(idx);return}
    if(galLifted===frame){dropFrame(frame);return}
    holdStarted=false;
    frame.classList.add('holding');
    prog=0;startT=Date.now();
    animRing(frame);
  }
  function endHold(){
    if(!frame.classList.contains('holding'))return;
    frame.classList.remove('holding');
    cancelAnimationFrame(raf);
    if(prog>=1){liftFrame(frame);}
    else{prog=0;}
  }

  function animRing(f){
    const ring=f.querySelector('.hold-ring canvas');
    if(!ring)return;
    const W=f.querySelector('.pic-mount').offsetWidth+20;
    const H=f.querySelector('.pic-mount').offsetHeight+20;
    ring.width=W;ring.height=H;
    prog=Math.min(1,(Date.now()-startT)/700);
    // emit tick sound at 33% and 66%
    if(prog>.32&&prog<.35)playHoldTick();
    if(prog>.65&&prog<.68)playHoldTick();
    const ctx=ring.getContext('2d');ctx.clearRect(0,0,W,H);
    ctx.strokeStyle=`rgba(247,37,133,${.4+prog*.5})`;
    ctx.lineWidth=2;ctx.lineCap='round';
    // draw progress arc around frame corners
    const R=8,pad=0;
    const perims=[W-2*R,H-2*R,W-2*R,H-2*R];
    const total=2*(W+H)-8*R+2*Math.PI*R;
    const drawn=prog*total;
    ctx.beginPath();
    // start top-left, go clockwise
    ctx.moveTo(R,0);
    drawRoundedRectPath(ctx,pad,pad,W-pad*2,H-pad*2,R);
    ctx.stroke();
    // clip to progress using dash
    ctx.setLineDash([drawn,total]);
    ctx.stroke();

    if(prog>=1){playHoldReady();frame.classList.remove('holding');liftFrame(frame);return;}
    raf=requestAnimationFrame(()=>animRing(f));
  }

  frame.addEventListener('pointerdown',e=>{getAC();startHold(e);e.preventDefault()});
  frame.addEventListener('pointerup',endHold);
  frame.addEventListener('pointerleave',endHold);
  frame.addEventListener('touchstart',e=>{getAC();startHold(e);e.preventDefault()},{passive:false});
  frame.addEventListener('touchend',endHold);
}

function drawRoundedRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function liftFrame(frame){
  if(galLifted&&galLifted!==frame)dropFrame(galLifted);
  frame.classList.add('lifted','lifting');
  galLifted=frame;playLift();
  holdStarted=true;
  setTimeout(()=>holdStarted=false,200);
}
function dropFrame(frame){
  frame.classList.remove('lifted','lifting');
  galLifted=null;
}

function galGoTo(idx,instant=false){
  if(galLifted)dropFrame(galLifted);
  galIdx=((idx%imgFiles.length)+imgFiles.length)%imgFiles.length;
  const wall=document.getElementById('gal-wall');
  const frames=wall.querySelectorAll('.pic-frame');
  frames.forEach((f,i)=>{f.classList.toggle('active',i===galIdx);f.classList.toggle('dimmed',i!==galIdx)});
  const frame=wall.children[galIdx];
  if(!frame)return;
  if(!instant)playSlide();
  const vW=window.innerWidth;
  const targetX=-(frame.offsetLeft-(vW-frame.offsetWidth)/2);
  wall.style.transition=instant?'none':'transform .78s cubic-bezier(.16,1,.3,1)';
  wall.style.transform=`translateX(${targetX}px)`;
  moveWallSpot(galIdx,instant);
  document.getElementById('gal-ctr').textContent=String(galIdx+1).padStart(2,'0')+' / '+String(imgFiles.length).padStart(2,'0');
  document.getElementById('gal-prog').style.width=((galIdx+1)/imgFiles.length*100)+'%';
}

function moveWallSpot(idx,instant=false){
  const wall=document.getElementById('gal-wall');
  const frame=wall.children[idx];if(!frame)return;
  const vW=window.innerWidth,vH=window.innerHeight;
  const targetX=-(frame.offsetLeft-(vW-frame.offsetWidth)/2);
  const cx=frame.offsetLeft+frame.offsetWidth/2+targetX;
  const cy=vH*.46;
  const spot=document.getElementById('wall-spot');
  spot.style.transition=instant?'none':'left .78s cubic-bezier(.16,1,.3,1),top .6s cubic-bezier(.16,1,.3,1)';
  spot.style.left=cx+'px';spot.style.top=cy+'px';
}

document.getElementById('gal-prev').addEventListener('click',()=>galGoTo(galIdx-1));
document.getElementById('gal-next').addEventListener('click',()=>galGoTo(galIdx+1));
document.getElementById('gal-back').addEventListener('click',()=>{
  if(galLifted)dropFrame(galLifted);
  showScreen('sc-cat');startDust();
});

// swipe
let gDS=null,gDr=false;
document.getElementById('sc-gallery').addEventListener('pointerdown',e=>{gDS=e.clientX;gDr=true});
document.getElementById('sc-gallery').addEventListener('pointerup',e=>{
  if(!gDr)return;gDr=false;
  const d=e.clientX-gDS;
  if(Math.abs(d)>65){galGoTo(d<0?galIdx+1:galIdx-1);}
  gDS=null;
});

document.addEventListener('keydown',e=>{
  if(document.getElementById('sc-gallery').classList.contains('on')){
    if(e.key==='ArrowRight')galGoTo(galIdx+1);
    if(e.key==='ArrowLeft')galGoTo(galIdx-1);
    if(e.key==='Escape'){document.getElementById('gal-back').click();}
  }
  if(document.getElementById('sc-tv').classList.contains('on')){
    if(e.key==='ArrowRight')vidGoTo(vidIdx+1);
    if(e.key==='ArrowLeft')vidGoTo(vidIdx-1);
    if(e.key==='Escape'){document.getElementById('tv-back').click();}
  }
});

/* ══ VIDEO GALLERY ══ */
let vidIdx=0,vidBusy=false;

function openVideos(){
  buildVidWall();
  showScreen('sc-tv');
}

function buildVidWall(){
  const wall=document.getElementById('vid-wall');
  wall.innerHTML='';vidIdx=0;

  if(!vidFiles.length){
    const empty=document.createElement('div');empty.className='vid-empty-msg show';
    empty.innerHTML='<p>No videos yet.<br>Add files to <span>videos/</span></p>';
    wall.appendChild(empty);
    document.getElementById('vid-prev').style.visibility='hidden';
    document.getElementById('vid-next').style.visibility='hidden';
    return;
  }
  document.getElementById('vid-prev').style.visibility='';
  document.getElementById('vid-next').style.visibility='';

  vidFiles.forEach((file,i)=>{
    const url=`${RAW}/videos/${file.name}`;
    const frame=document.createElement('div');
    frame.className='vid-frame'+(i===0?' active':' dimmed');
    frame.setAttribute('data-idx',i);

    const mount=document.createElement('div');mount.className='vid-mount';

    const vid=document.createElement('video');
    vid.className='vid-el';vid.src=url;vid.loop=true;vid.muted=true;vid.playsInline=true;vid.preload='metadata';

    const scanlines=document.createElement('div');scanlines.className='vid-scanlines';

    const sc=document.createElement('canvas');sc.className='vid-static-canvas';

    const label=document.createElement('div');label.className='vid-mount-label';
    label.innerHTML=`<span class="vid-mount-ch">CH ${String(i+1).padStart(2,'0')}</span><span class="vid-mount-name">${file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ')}</span>`;

    mount.append(vid,scanlines,sc,label);frame.appendChild(mount);

    // click to change channel
    vid.addEventListener('click',()=>{
      if(vidBusy)return;
      vidGoTo((i+1)%vidFiles.length);
    });
    mount.addEventListener('click',e=>{
      if(e.target===vid)return;
      vidGoTo((vidIdx+1)%vidFiles.length);
    });

    wall.appendChild(frame);
  });

  vidGoTo(0,true);
  const hint=document.getElementById('vid-click-hint');
  hint.classList.add('show');setTimeout(()=>hint.classList.remove('show'),3500);
}

function vidGoTo(idx,instant=false){
  vidIdx=((idx%vidFiles.length)+vidFiles.length)%vidFiles.length;
  const wall=document.getElementById('vid-wall');
  const frames=wall.querySelectorAll('.vid-frame');
  // pause all, play current
  frames.forEach((f,i)=>{
    const v=f.querySelector('video');
    f.classList.toggle('active',i===vidIdx);
    f.classList.toggle('dimmed',i!==vidIdx);
    if(i===vidIdx){if(!instant)showVidStatic(f,v);}
    else v&&v.pause();
  });

  const frame=wall.children[vidIdx];if(!frame)return;
  if(!instant)playStaticBurst();
  const vW=window.innerWidth;
  const targetX=-(frame.offsetLeft-(vW-frame.offsetWidth)/2);
  wall.style.transition=instant?'none':'transform .78s cubic-bezier(.16,1,.3,1)';
  wall.style.transform=`translateX(${targetX}px)`;

  document.getElementById('tv-ctr').textContent=String(vidIdx+1).padStart(2,'0')+' / '+String(vidFiles.length).padStart(2,'0');
  document.getElementById('vid-prog').style.width=((vidIdx+1)/vidFiles.length*100)+'%';

  // move spotlight to current frame
  const spot=document.getElementById('vid-spot');
  const cx=frame.offsetLeft+frame.offsetWidth/2+targetX;
  spot.style.transition=instant?'none':'left .78s cubic-bezier(.16,1,.3,1)';
  spot.style.left=cx+'px';spot.style.top='50%';

  if(instant){const v=frame.querySelector('video');if(v)v.play().catch(()=>{})}
}

function showVidStatic(frame,vid){
  vidBusy=true;
  const sc=frame.querySelector('.vid-static-canvas');
  if(!sc)return;
  const el=frame.querySelector('.vid-mount');
  sc.width=el.offsetWidth;sc.height=el.offsetHeight;
  sc.style.opacity='1';
  const ctx=sc.getContext('2d');
  let af;
  (function ds(){
    const id=ctx.createImageData(sc.width,sc.height);
    for(let i=0;i<id.data.length;i+=4){const v=Math.random()*255|0;id.data[i]=v;id.data[i+1]=v;id.data[i+2]=v;id.data[i+3]=160+Math.random()*80;}
    ctx.putImageData(id,0,0);af=requestAnimationFrame(ds);
  })();
  setTimeout(()=>{
    cancelAnimationFrame(af);sc.style.opacity='0';
    if(vid){vid.play().catch(()=>{});}
    vidBusy=false;
  },220);
}

document.getElementById('vid-prev').addEventListener('click',()=>vidGoTo(vidIdx-1));
document.getElementById('vid-next').addEventListener('click',()=>vidGoTo(vidIdx+1));
document.getElementById('tv-back').addEventListener('click',()=>{
  document.querySelectorAll('.vid-el').forEach(v=>v.pause());
  showScreen('sc-cat');startDust();
});

document.getElementById('sc-tv').addEventListener('pointerdown',e=>{vDS=e.clientX;vDr=true});
document.getElementById('sc-tv').addEventListener('pointerup',e=>{
  if(!vDr)return;vDr=false;
  const d=e.clientX-vDS;
  if(Math.abs(d)>65)vidGoTo(d<0?vidIdx+1:vidIdx-1);
  vDS=null;
});
