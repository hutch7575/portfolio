<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --text: #f0ede6;
      --muted: #444;
      --border: #1e1e1e;
      --accent: #ff2d78;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cursor-dot {
      position: fixed; z-index: 9999;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
    }
    #cursor-ring {
      position: fixed; z-index: 9998;
      width: 34px; height: 34px;
      border: 1px solid rgba(255,45,120,0.45);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s, border-color .2s;
    }
    body.hovering #cursor-ring { width: 54px; height: 54px; border-color: rgba(255,45,120,.85); }

    /* ── NOISE ── */
    body::after {
      content:''; position:fixed; inset:0; z-index:9990; pointer-events:none; opacity:.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px;
    }

    /* ══════════════════════════════════
       LANDING
    ══════════════════════════════════ */
    #landing {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      transition: opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1);
    }
    #landing.out { opacity: 0; pointer-events: none; transform: scale(1.04); }

    .landing-nav {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 2rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 2;
    }
    .landing-logo {
      font-family: 'DM Mono', monospace; font-size: .75rem;
      letter-spacing: .15em; text-transform: uppercase; color: var(--text);
    }
    .landing-hint {
      font-family: 'DM Mono', monospace; font-size: .65rem;
      letter-spacing: .15em; text-transform: uppercase; color: var(--muted);
    }

    .landing-split { display: flex; width: 100%; height: 100%; }

    .landing-card {
      flex: 1; position: relative;
      display: flex; align-items: flex-end; padding: 3rem;
      overflow: hidden;
      transition: flex .5s cubic-bezier(.16,1,.3,1);
    }
    .landing-card:hover { flex: 1.2; }

    .card-divider {
      width: 1px; background: var(--border); flex-shrink: 0; z-index: 2; position: relative;
    }
    .card-divider::after {
      content:''; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:1px; height:50px; background:var(--accent);
      animation: divPulse 2s ease-in-out infinite;
    }
    @keyframes divPulse {
      0%,100%{opacity:.3;height:35px} 50%{opacity:1;height:70px}
    }

    .card-bg {
      position:absolute; inset:-8%;
      background-size:cover; background-position:center;
      transition: filter .5s, transform .5s cubic-bezier(.16,1,.3,1);
    }
    .card-bg-default-a {
      background: radial-gradient(ellipse at 30% 60%, #ff2d7830 0%, transparent 65%),
                  radial-gradient(ellipse at 80% 20%, #33001a18 0%, transparent 60%), var(--bg);
      filter: none !important;
    }
    .card-bg-default-b {
      background: radial-gradient(ellipse at 70% 40%, #ff2d7820 0%, transparent 65%),
                  radial-gradient(ellipse at 20% 80%, #00113318 0%, transparent 60%), var(--bg);
      filter: none !important;
    }
    .card-bg-photo { filter: brightness(.18) saturate(.3); }
    .landing-card:hover .card-bg-photo { filter: brightness(.3) saturate(.5); transform: scale(1.04); }

    .card-vignette {
      position:absolute; inset:0; z-index:1;
      background: linear-gradient(to top, rgba(8,8,8,.85) 0%, rgba(8,8,8,.1) 50%);
    }

    .card-content { position:relative; z-index:2; display:flex; flex-direction:column; gap:.6rem; }

    .card-label {
      font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.2em;
      text-transform:uppercase; color:var(--accent);
      opacity:0; transform:translateY(10px);
      animation: fadeUp .5s forwards;
    }
    .landing-card:nth-child(1) .card-label { animation-delay:.4s; }
    .landing-card:nth-child(3) .card-label { animation-delay:.55s; }

    .card-title {
      font-size: clamp(2.8rem,6vw,6.5rem); font-weight:700;
      letter-spacing:-.04em; line-height:.9; color:var(--text);
      opacity:0; transform:translateY(20px); animation: fadeUp .6s forwards;
      transition: color .3s;
    }
    .landing-card:nth-child(1) .card-title { animation-delay:.5s; }
    .landing-card:nth-child(3) .card-title { animation-delay:.65s; }
    .landing-card:hover .card-title { color: var(--accent); }

    .card-count {
      font-family:'DM Mono',monospace; font-size:.7rem; color:var(--muted);
      letter-spacing:.08em; opacity:0; animation: fadeUp .5s forwards;
    }
    .landing-card:nth-child(1) .card-count { animation-delay:.6s; }
    .landing-card:nth-child(3) .card-count { animation-delay:.75s; }

    .card-arrow {
      font-size:1.8rem; color:var(--accent); opacity:0;
      transform:translateX(-10px); transition: opacity .3s, transform .3s; line-height:1; margin-top:.4rem;
    }
    .landing-card:hover .card-arrow { opacity:1; transform:translateX(0); }

    /* ══════════════════════════════════
       GALLERY
    ══════════════════════════════════ */
    #gallery {
      position:fixed; inset:0; z-index:5;
      opacity:0; pointer-events:none;
      transition:opacity .5s;
      background: var(--bg);
    }
    #gallery.active { opacity:1; pointer-events:all; }

    /* top bar */
    #back-btn {
      position:fixed; top:2rem; left:2.5rem; z-index:200;
      background:none; border:none;
      font-family:'DM Mono',monospace; font-size:.7rem;
      letter-spacing:.15em; text-transform:uppercase;
      color:var(--muted); cursor:none;
      display:flex; align-items:center; gap:.6rem; transition:color .2s;
    }
    #back-btn:hover { color:var(--text); }
    #back-btn span { transition:transform .2s; display:inline-block; }
    #back-btn:hover span { transform:translateX(-4px); }

    #gallery-title {
      position:fixed; top:2rem; left:50%; transform:translateX(-50%); z-index:200;
      font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.2em;
      text-transform:uppercase; color:var(--accent);
    }
    #gallery-counter {
      position:fixed; top:2rem; right:2.5rem; z-index:200;
      font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--muted);
    }

    /* carousel viewport */
    #carousel-viewport {
      position:absolute; inset:0; overflow:hidden;
    }
    #carousel {
      position:absolute; top:0; left:0; height:100%;
      display:flex;
      will-change:transform;
    }

    /* each slide */
    .slide {
      position:relative;
      width:100vw; height:100vh;
      flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    /* blurred bg fill */
    .slide-bg {
      position:absolute; inset:-15%;
      background-size:cover; background-position:center;
      filter:blur(28px) brightness(.35) saturate(.5);
      transform:scale(1.1);
      will-change:transform;
    }

    /* actual media — contained, never cropped */
    .slide-media-wrap {
      position:relative; z-index:1;
      display:flex; align-items:center; justify-content:center;
      width:100%; height:100%;
      padding:5rem 6rem 5rem;
    }

    .slide-media-wrap img,
    .slide-media-wrap video {
      max-width:100%; max-height:100%;
      width:auto; height:auto;
      object-fit:contain;
      display:block;
      border-radius:2px;
      box-shadow: 0 30px 80px rgba(0,0,0,.7);
      will-change:transform;
      transition: transform .1s linear;
    }

    /* vignette edges */
    .slide::after {
      content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
      background:
        linear-gradient(to right,  rgba(8,8,8,.6) 0%, transparent 12%, transparent 88%, rgba(8,8,8,.6) 100%),
        linear-gradient(to bottom, rgba(8,8,8,.5) 0%, transparent 15%, transparent 85%, rgba(8,8,8,.5) 100%);
    }

    .slide-info {
      position:absolute; bottom:3rem; left:3rem; z-index:3;
      opacity:0; transform:translateY(6px);
      transition: opacity .3s, transform .3s;
    }
    #gallery:hover .slide-info,
    .slide-info.visible { opacity:1; transform:none; }

    .slide-name {
      font-family:'DM Mono',monospace; font-size:.65rem;
      letter-spacing:.1em; color:rgba(240,237,230,.5);
    }

    /* nav arrows */
    .gallery-nav {
      position:fixed; top:50%; z-index:200;
      transform:translateY(-50%);
      background:none; border:none;
      color:var(--muted); font-size:2.5rem;
      cursor:none; padding:1rem;
      transition: color .2s, transform .2s;
      line-height:1;
    }
    #prev-btn { left:1rem; }
    #next-btn { right:1rem; }
    .gallery-nav:hover { color:var(--accent); }
    #prev-btn:hover { transform:translateY(-50%) translateX(-4px); }
    #next-btn:hover { transform:translateY(-50%) translateX(4px); }

    /* progress */
    #progress-bar {
      position:fixed; bottom:0; left:0; height:2px;
      background:var(--accent); z-index:200; transition:width .35s ease;
    }

    /* thumbnail strip */
    #thumb-strip {
      position:fixed; bottom:1.75rem; left:50%; transform:translateX(-50%);
      z-index:200; display:flex; gap:5px; align-items:center;
      max-width:90vw; overflow-x:auto; padding-bottom:2px;
    }
    #thumb-strip::-webkit-scrollbar { display:none; }

    .thumb {
      width:36px; height:36px; border-radius:2px; overflow:hidden;
      opacity:.3; transition:opacity .2s, transform .2s, outline .1s;
      flex-shrink:0; cursor:none;
    }
    .thumb img, .thumb video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
    .thumb.active { opacity:1; transform:scale(1.25); outline:1.5px solid var(--accent); outline-offset:2px; }
    .thumb:not(.active):hover { opacity:.6; }

    /* empty */
    #gallery-empty {
      display:none; position:absolute; inset:0;
      flex-direction:column; align-items:center; justify-content:center;
      gap:1rem; text-align:center;
    }
    #gallery-empty.show { display:flex; }
    #gallery-empty p {
      font-family:'DM Mono',monospace; font-size:.8rem;
      letter-spacing:.1em; color:var(--muted);
    }
    #gallery-empty span { color:var(--accent); }

    @keyframes fadeUp { to { opacity:1; transform:none; } }

    /* mobile */
    @media (max-width:640px) {
      .landing-split { flex-direction:column; }
      .card-divider { width:100%; height:1px; }
      .card-divider::after { width:60px; height:1px; top:50%; left:50%; }
      .landing-card { padding:2rem; }
      .landing-nav { padding:1.25rem 1.5rem; }
      .slide-media-wrap { padding:4.5rem 1.5rem 4rem; }
      #back-btn { left:1.25rem; top:1.25rem; }
      #gallery-title { top:1.25rem; }
      #gallery-counter { top:1.25rem; right:1.25rem; }
    }

    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after { animation:none !important; transition-duration:.01ms !important; }
    }
  </style>
</head>
<body>

  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <!-- LANDING -->
  <div id="landing">
    <div class="landing-nav">
      <span class="landing-logo">YN™ Portfolio</span>
      <span class="landing-hint">Select a category</span>
    </div>
    <div class="landing-split">
      <div class="landing-card" id="card-images" data-type="images">
        <div class="card-bg card-bg-default-a" id="card-bg-images"></div>
        <div class="card-vignette"></div>
        <div class="card-content">
          <span class="card-label">Category 01</span>
          <h2 class="card-title">Images</h2>
          <span class="card-count" id="count-images">— files</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="landing-card" id="card-videos" data-type="videos">
        <div class="card-bg card-bg-default-b" id="card-bg-videos"></div>
        <div class="card-vignette"></div>
        <div class="card-content">
          <span class="card-label">Category 02</span>
          <h2 class="card-title">Videos</h2>
          <span class="card-count" id="count-videos">— files</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div id="gallery">
    <button id="back-btn"><span>←</span> Back</button>
    <span id="gallery-title"></span>
    <span id="gallery-counter"></span>
    <div id="carousel-viewport">
      <div id="carousel"></div>
    </div>
    <div id="gallery-empty">
      <p>No files yet.</p>
      <p>Drop files into <span id="empty-folder"></span> to see them here.</p>
    </div>
    <button class="gallery-nav" id="prev-btn">‹</button>
    <button class="gallery-nav" id="next-btn">›</button>
    <div id="progress-bar"></div>
    <div id="thumb-strip"></div>
  </div>

  <script>
  /* ── CONFIG ── */
  const REPO    = 'hutch7575/portfolio';
  const BRANCH  = 'main';
  const API     = `https://api.github.com/repos/${REPO}/contents`;
  const RAW     = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
  const IMG_EXT = ['jpg','jpeg','png','gif','webp','svg','avif'];
  const VID_EXT = ['mp4','webm','mov','ogg'];
  const getExt  = f => f.split('.').pop().toLowerCase();

  /* ── CURSOR ── */
  const cdot = document.getElementById('cursor-dot');
  const cring = document.getElementById('cursor-ring');
  let mx=0, my=0, rx=0, ry=0;

  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    cdot.style.left=mx+'px'; cdot.style.top=my+'px';
  });
  (function animRing(){
    rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
    cring.style.left=rx+'px'; cring.style.top=ry+'px';
    requestAnimationFrame(animRing);
  })();
  document.addEventListener('mouseover', e => {
    const hoverable = e.target.closest('.landing-card, button, .thumb');
    document.body.classList.toggle('hovering', !!hoverable);
  });

  /* ── DATA ── */
  let imageFiles=[], videoFiles=[];

  async function loadFolder(folder){
    try {
      const r = await fetch(`${API}/${folder}`);
      if(!r.ok) return [];
      const d = await r.json();
      return Array.isArray(d) ? d.filter(f=>f.name!=='.gitkeep') : [];
    } catch { return []; }
  }

  async function init(){
    [imageFiles, videoFiles] = await Promise.all([loadFolder('images'), loadFolder('videos')]);
    const imgs = imageFiles.filter(f=>IMG_EXT.includes(getExt(f.name)));
    const vids = videoFiles.filter(f=>VID_EXT.includes(getExt(f.name)));

    document.getElementById('count-images').textContent = `${imgs.length} file${imgs.length!==1?'s':''}`;
    document.getElementById('count-videos').textContent = `${vids.length} file${vids.length!==1?'s':''}`;

    if(imgs.length){
      const bg = document.getElementById('card-bg-images');
      bg.style.backgroundImage = `url(${RAW}/images/${imgs[0].name})`;
      bg.classList.remove('card-bg-default-a');
      bg.classList.add('card-bg-photo');
    }
  }

  /* ── NAV ── */
  let currentType='images', currentIndex=0, slides=[], isAnimating=false;

  document.getElementById('card-images').addEventListener('click', ()=>openGallery('images'));
  document.getElementById('card-videos').addEventListener('click', ()=>openGallery('videos'));

  function openGallery(type){
    currentType=type; currentIndex=0;
    const files = type==='images'
      ? imageFiles.filter(f=>IMG_EXT.includes(getExt(f.name)))
      : videoFiles.filter(f=>VID_EXT.includes(getExt(f.name)));
    document.getElementById('gallery-title').textContent = type==='images'?'Images':'Videos';
    document.getElementById('landing').classList.add('out');
    document.getElementById('gallery').classList.add('active');
    buildCarousel(files, type);
  }

  document.getElementById('back-btn').addEventListener('click', ()=>{
    document.getElementById('landing').classList.remove('out');
    document.getElementById('gallery').classList.remove('active');
    document.querySelectorAll('#carousel video').forEach(v=>v.pause());
  });

  /* ── BUILD CAROUSEL ── */
  function buildCarousel(files, type){
    slides=files;
    const carousel   = document.getElementById('carousel');
    const thumbStrip = document.getElementById('thumb-strip');
    const empty      = document.getElementById('gallery-empty');
    carousel.innerHTML=''; thumbStrip.innerHTML='';

    if(!files.length){
      empty.classList.add('show');
      document.getElementById('empty-folder').textContent = type+'/';
      document.getElementById('prev-btn').style.visibility='hidden';
      document.getElementById('next-btn').style.visibility='hidden';
      return;
    }
    empty.classList.remove('show');
    document.getElementById('prev-btn').style.visibility='';
    document.getElementById('next-btn').style.visibility='';

    files.forEach((file,i)=>{
      const url   = `${RAW}/${type}/${file.name}`;
      const isVid = VID_EXT.includes(getExt(file.name));

      /* slide */
      const slide = document.createElement('div');
      slide.className='slide';

      /* blurred bg */
      const bg = document.createElement('div');
      bg.className='slide-bg';
      bg.style.backgroundImage=`url(${url})`;
      slide.appendChild(bg);

      /* media wrap */
      const wrap = document.createElement('div');
      wrap.className='slide-media-wrap';

      if(isVid){
        const v=document.createElement('video');
        v.src=url; v.loop=true; v.muted=true; v.playsInline=true; v.preload='metadata';
        wrap.appendChild(v);
      } else {
        const img=document.createElement('img');
        img.src=url; img.alt=file.name;
        img.loading= i===0?'eager':'lazy';
        img.draggable=false;
        wrap.appendChild(img);
      }

      const info = document.createElement('div');
      info.className='slide-info';
      info.innerHTML=`<span class="slide-name">${file.name}</span>`;

      slide.appendChild(wrap);
      slide.appendChild(info);
      carousel.appendChild(slide);

      /* thumb */
      const thumb=document.createElement('div');
      thumb.className='thumb'+(i===0?' active':'');
      const tEl = isVid ? document.createElement('video') : document.createElement('img');
      tEl.src=url; if(isVid){tEl.muted=true;tEl.preload='metadata';}
      thumb.appendChild(tEl);
      thumb.addEventListener('click', ()=>goTo(i));
      thumbStrip.appendChild(thumb);
    });

    goTo(0, true);
  }

  /* ── GOTO ── */
  function goTo(idx, instant=false){
    if(isAnimating && !instant) return;
    isAnimating=true;

    // pause prev video
    const prevWrap = document.querySelector(`.slide:nth-child(${currentIndex+1}) video`);
    if(prevWrap) prevWrap.pause();

    currentIndex = ((idx % slides.length) + slides.length) % slides.length;

    const carousel = document.getElementById('carousel');
    carousel.style.transition = instant ? 'none' : 'transform .7s cubic-bezier(.16,1,.3,1)';
    carousel.style.transform  = `translateX(${-currentIndex*100}vw)`;

    setTimeout(()=>{
      const curVid = document.querySelector(`.slide:nth-child(${currentIndex+1}) video`);
      if(curVid) curVid.play();
      isAnimating=false;
    }, instant?0:700);

    // update UI
    document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===currentIndex));
    document.getElementById('gallery-counter').textContent =
      String(currentIndex+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
    document.getElementById('progress-bar').style.width =
      ((currentIndex+1)/slides.length*100)+'%';

    // scroll thumb into view
    const activeThumb = document.querySelectorAll('.thumb')[currentIndex];
    if(activeThumb) activeThumb.scrollIntoView({inline:'center', behavior:'smooth', block:'nearest'});

    // show slide info briefly
    document.querySelectorAll('.slide-info').forEach(el=>el.classList.remove('visible'));
    const info = document.querySelector(`.slide:nth-child(${currentIndex+1}) .slide-info`);
    if(info){
      info.classList.add('visible');
      clearTimeout(info._hideTimer);
      info._hideTimer = setTimeout(()=>info.classList.remove('visible'), 2500);
    }

    applyParallax(lastMX);
  }

  document.getElementById('prev-btn').addEventListener('click', ()=>goTo(currentIndex-1));
  document.getElementById('next-btn').addEventListener('click', ()=>goTo(currentIndex+1));

  document.addEventListener('keydown', e=>{
    if(!document.getElementById('gallery').classList.contains('active')) return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(currentIndex+1);
    if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   goTo(currentIndex-1);
    if(e.key==='Escape') document.getElementById('back-btn').click();
  });

  /* ── PARALLAX ── */
  let lastMX=0;
  document.addEventListener('mousemove', e=>{
    lastMX = (e.clientX/window.innerWidth-.5)*2;
    applyParallax(lastMX);
  });

  function applyParallax(nx){
    // only apply to current slide's media for perf
    const slide = document.querySelector(`.slide:nth-child(${currentIndex+1})`);
    if(!slide) return;
    const media = slide.querySelector('img, video');
    const bg    = slide.querySelector('.slide-bg');
    if(media) media.style.transform=`translateX(${nx*12}px)`;
    if(bg)    bg.style.transform   =`scale(1.1) translateX(${nx*-18}px)`;
  }

  /* ── SWIPE / DRAG ── */
  let dragStart=null, dragging=false, dragMoved=false;

  document.getElementById('carousel-viewport').addEventListener('pointerdown', e=>{
    dragStart=e.clientX; dragging=true; dragMoved=false;
    document.getElementById('carousel-viewport').setPointerCapture(e.pointerId);
  });
  document.getElementById('carousel-viewport').addEventListener('pointermove', e=>{
    if(!dragging) return;
    const delta=e.clientX-dragStart;
    if(Math.abs(delta)>4) dragMoved=true;
    const carousel=document.getElementById('carousel');
    carousel.style.transition='none';
    carousel.style.transform=`translateX(calc(${-currentIndex*100}vw + ${delta}px))`;
  });
  document.getElementById('carousel-viewport').addEventListener('pointerup', e=>{
    if(!dragging) return;
    dragging=false;
    const delta=e.clientX-dragStart;
    if(Math.abs(delta)>60) { goTo(delta<0?currentIndex+1:currentIndex-1); }
    else goTo(currentIndex);
    dragStart=null;
  });

  /* ── BOOT ── */
  init();
  </script>
</body>
</html>
