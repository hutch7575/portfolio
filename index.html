<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --text: #f0ede6;
      --muted: #555;
      --border: #1e1e1e;
      --accent: #ff2d78;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── CURSOR: real arrow shape but animated ── */
    * { cursor: none !important; }

    #cursor {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      top: 0; left: 0;
      width: 20px; height: 20px;
      /* CSS arrow cursor shape */
      transform: translate(0, 0);
      transition: transform .05s linear;
    }

    #cursor svg {
      width: 20px; height: 20px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.8));
      transition: transform .15s cubic-bezier(.16,1,.3,1);
    }

    #cursor.hovering svg {
      transform: scale(1.15);
    }

    /* trailing ring that lags behind */
    #cursor-trail {
      position: fixed;
      z-index: 9997;
      pointer-events: none;
      width: 28px; height: 28px;
      border: 1.5px solid rgba(255,45,120,.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: border-color .2s;
    }
    #cursor.hovering ~ #cursor-trail {
      border-color: rgba(255,45,120,.9);
      width: 44px; height: 44px;
    }

    /* ── NOISE ── */
    body::after {
      content:''; position:fixed; inset:0; z-index:9990;
      pointer-events:none; opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px;
    }

    /* ══════════════════════════════════
       LANDING
    ══════════════════════════════════ */
    #landing {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      transition: opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1);
    }
    #landing.out { opacity:0; pointer-events:none; transform:scale(1.03); }

    .landing-nav {
      position: absolute; top:0; left:0; right:0;
      padding: 2rem 3rem;
      display: flex; justify-content:space-between; align-items:center;
      z-index: 2;
    }
    .landing-logo {
      font-family: 'DM Mono', monospace; font-size:.8rem;
      letter-spacing:.12em; text-transform:uppercase; color:var(--text);
    }
    .landing-hint {
      font-family: 'DM Mono', monospace; font-size:.65rem;
      letter-spacing:.15em; text-transform:uppercase; color:var(--muted);
    }

    .landing-split { display:flex; width:100%; height:100%; }

    .landing-card {
      flex:1; position:relative;
      display:flex; align-items:flex-end; padding:3rem;
      overflow:hidden;
      transition: flex .55s cubic-bezier(.16,1,.3,1);
    }
    .landing-card:hover { flex:1.22; }

    .card-divider {
      width:1px; background:var(--border); flex-shrink:0; z-index:2; position:relative;
    }
    .card-divider::after {
      content:''; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:1px; height:48px; background:var(--accent);
      animation: divPulse 2.4s ease-in-out infinite;
    }
    @keyframes divPulse { 0%,100%{opacity:.25;height:32px} 50%{opacity:1;height:72px} }

    .card-bg {
      position:absolute; inset:-8%;
      background-size:cover; background-position:center;
      transition: filter .5s, transform .55s cubic-bezier(.16,1,.3,1);
    }
    .card-bg-gradient-a {
      background:
        radial-gradient(ellipse at 30% 65%, rgba(255,45,120,.18) 0%, transparent 65%),
        radial-gradient(ellipse at 75% 20%, rgba(80,0,30,.14) 0%, transparent 60%),
        var(--bg);
    }
    .card-bg-gradient-b {
      background:
        radial-gradient(ellipse at 70% 45%, rgba(255,45,120,.13) 0%, transparent 65%),
        radial-gradient(ellipse at 20% 75%, rgba(0,10,30,.14) 0%, transparent 60%),
        var(--bg);
    }
    .card-bg-photo { filter:brightness(.18) saturate(.35); }
    .landing-card:hover .card-bg-photo { filter:brightness(.28) saturate(.55); transform:scale(1.05) translateY(-1%); }

    .card-vignette {
      position:absolute; inset:0; z-index:1;
      background:linear-gradient(to top, rgba(8,8,8,.88) 0%, rgba(8,8,8,.05) 55%);
    }

    .card-content { position:relative; z-index:2; display:flex; flex-direction:column; gap:.55rem; }

    .card-label {
      font-family:'DM Mono',monospace; font-size:.62rem; letter-spacing:.22em;
      text-transform:uppercase; color:var(--accent);
      opacity:0; transform:translateY(10px); animation:fadeUp .5s forwards;
    }
    .landing-card:nth-child(1) .card-label { animation-delay:.35s; }
    .landing-card:nth-child(3) .card-label { animation-delay:.5s; }

    .card-title {
      font-size:clamp(2.6rem,5.5vw,6rem); font-weight:700;
      letter-spacing:-.04em; line-height:.88; color:var(--text);
      opacity:0; transform:translateY(22px); animation:fadeUp .6s forwards;
      transition:color .3s;
    }
    .landing-card:nth-child(1) .card-title { animation-delay:.45s; }
    .landing-card:nth-child(3) .card-title { animation-delay:.6s; }
    .landing-card:hover .card-title { color:var(--accent); }

    .card-count {
      font-family:'DM Mono',monospace; font-size:.7rem; color:var(--muted);
      letter-spacing:.08em; opacity:0; animation:fadeUp .5s forwards;
    }
    .landing-card:nth-child(1) .card-count { animation-delay:.55s; }
    .landing-card:nth-child(3) .card-count { animation-delay:.7s; }

    .card-arrow {
      display:inline-block; font-size:1.4rem; color:var(--accent);
      opacity:0; transform:translateX(-8px);
      transition:opacity .25s, transform .25s; margin-top:.3rem;
    }
    .landing-card:hover .card-arrow { opacity:1; transform:translateX(0); }

    /* ══════════════════════════════════
       GALLERY
    ══════════════════════════════════ */
    #gallery {
      position:fixed; inset:0; z-index:5;
      opacity:0; pointer-events:none;
      transition:opacity .45s;
      background:var(--bg);
    }
    #gallery.active { opacity:1; pointer-events:all; }

    /* top bar */
    #gallery-bar {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; align-items:center; justify-content:space-between;
      padding:1.75rem 2.5rem;
      background:linear-gradient(to bottom, rgba(8,8,8,.9) 0%, transparent 100%);
    }
    #back-btn {
      background:none; border:none;
      font-family:'DM Mono',monospace; font-size:.7rem;
      letter-spacing:.14em; text-transform:uppercase;
      color:var(--muted);
      display:flex; align-items:center; gap:.6rem;
      transition:color .2s; padding:0;
    }
    #back-btn:hover { color:var(--text); }
    #back-btn .arrow { display:inline-block; transition:transform .2s; }
    #back-btn:hover .arrow { transform:translateX(-4px); }

    #gallery-title {
      font-family:'DM Mono',monospace; font-size:.65rem;
      letter-spacing:.2em; text-transform:uppercase; color:var(--accent);
    }
    #gallery-counter {
      font-family:'DM Mono',monospace; font-size:.65rem;
      letter-spacing:.1em; color:var(--muted); min-width:4rem; text-align:right;
    }

    /* ── SLIDE AREA ── */
    #carousel-viewport {
      position:absolute; inset:0; overflow:hidden;
    }
    #carousel {
      position:absolute; top:0; left:0; height:100%;
      display:flex;
      will-change:transform;
    }

    .slide {
      position:relative;
      width:100vw; height:100vh;
      flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    /* ── EDGE BLEED CANVASES ── */
    /* left and right canvases sample edge pixels and fade out */
    .slide-bleed-left,
    .slide-bleed-right {
      position:absolute; top:0; bottom:0; z-index:1;
      width:220px; pointer-events:none;
    }
    .slide-bleed-left  { left:0; }
    .slide-bleed-right { right:0; }

    /* top/bottom dark fade */
    .slide-vignette {
      position:absolute; inset:0; z-index:2; pointer-events:none;
      background:
        linear-gradient(to bottom, rgba(8,8,8,.65) 0%, transparent 14%, transparent 86%, rgba(8,8,8,.65) 100%);
    }

    /* media — fully visible, contained */
    .slide-media-wrap {
      position:relative; z-index:3;
      display:flex; align-items:center; justify-content:center;
      width:100%; height:100%;
      padding:5.5rem 7rem 4.5rem;
    }

    .slide-media-wrap img,
    .slide-media-wrap video {
      max-width:100%; max-height:100%;
      width:auto; height:auto;
      object-fit:contain;
      display:block;
      border-radius:3px;
      box-shadow:0 24px 70px rgba(0,0,0,.75), 0 2px 8px rgba(0,0,0,.5);
      will-change:transform;
    }

    /* filename */
    .slide-info {
      position:absolute; bottom:2rem; left:2.5rem; z-index:4;
      opacity:0; transform:translateY(5px);
      transition:opacity .35s, transform .35s;
    }
    .slide-info.peek { opacity:1; transform:none; }
    .slide-name {
      font-family:'DM Mono',monospace; font-size:.6rem;
      letter-spacing:.1em; color:rgba(240,237,230,.45);
    }

    /* nav arrows */
    .gallery-nav {
      position:fixed; top:50%; z-index:200;
      transform:translateY(-50%);
      background:none; border:none; color:var(--muted);
      font-size:2rem; padding:1.25rem;
      transition:color .2s, transform .2s; line-height:1;
    }
    #prev-btn { left:.5rem; }
    #next-btn { right:.5rem; }
    .gallery-nav:hover { color:var(--accent); }
    #prev-btn:hover { transform:translateY(-50%) translateX(-3px); }
    #next-btn:hover { transform:translateY(-50%) translateX(3px); }

    /* progress */
    #progress-bar {
      position:fixed; bottom:0; left:0; height:2px;
      background:var(--accent); z-index:200; transition:width .35s ease;
    }

    /* thumbnails */
    #thumb-strip {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
      z-index:200; display:flex; gap:5px; align-items:center;
      max-width:80vw; overflow-x:auto; padding:4px 2px;
    }
    #thumb-strip::-webkit-scrollbar { display:none; }

    .thumb {
      width:38px; height:38px; border-radius:2px; overflow:hidden;
      opacity:.28; transition:opacity .2s, transform .2s, outline .1s;
      flex-shrink:0;
    }
    .thumb img, .thumb video {
      width:100%; height:100%; object-fit:cover; pointer-events:none; display:block;
    }
    .thumb.active { opacity:1; transform:scale(1.28); outline:1.5px solid var(--accent); outline-offset:2px; }
    .thumb:not(.active):hover { opacity:.55; }

    /* empty */
    #gallery-empty {
      display:none; position:absolute; inset:0;
      flex-direction:column; align-items:center; justify-content:center;
      gap:1rem; text-align:center;
    }
    #gallery-empty.show { display:flex; }
    #gallery-empty p { font-family:'DM Mono',monospace; font-size:.8rem; letter-spacing:.1em; color:var(--muted); }
    #gallery-empty span { color:var(--accent); }

    @keyframes fadeUp { to { opacity:1; transform:none; } }

    @media (max-width:640px) {
      .landing-split { flex-direction:column; }
      .card-divider { width:100%; height:1px; }
      .card-divider::after { width:60px; height:1px; top:50%; left:50%; }
      .landing-card { padding:2rem; }
      .landing-nav { padding:1.25rem 1.5rem; }
      .slide-media-wrap { padding:4.5rem 1.25rem 4rem; }
      .slide-bleed-left, .slide-bleed-right { width:80px; }
      #gallery-bar { padding:1.25rem 1.5rem; }
    }

    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after { animation:none !important; transition-duration:.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- custom cursor: real arrow SVG + trailing ring -->
  <div id="cursor">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 2L17 10L10.5 11.5L7.5 18L3 2Z" fill="white" stroke="#222" stroke-width="1" stroke-linejoin="round"/>
    </svg>
  </div>
  <div id="cursor-trail"></div>

  <!-- LANDING -->
  <div id="landing">
    <div class="landing-nav">
      <span class="landing-logo">YN™ Portfolio</span>
      <span class="landing-hint">Select a category</span>
    </div>
    <div class="landing-split">
      <div class="landing-card" id="card-images">
        <div class="card-bg card-bg-gradient-a" id="card-bg-images"></div>
        <div class="card-vignette"></div>
        <div class="card-content">
          <span class="card-label">Category 01</span>
          <h2 class="card-title">Images</h2>
          <span class="card-count" id="count-images">— files</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="landing-card" id="card-videos">
        <div class="card-bg card-bg-gradient-b" id="card-bg-videos"></div>
        <div class="card-vignette"></div>
        <div class="card-content">
          <span class="card-label">Category 02</span>
          <h2 class="card-title">Videos</h2>
          <span class="card-count" id="count-videos">— files</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div id="gallery">
    <div id="gallery-bar">
      <button id="back-btn"><span class="arrow">←</span> Back</button>
      <span id="gallery-title"></span>
      <span id="gallery-counter"></span>
    </div>
    <div id="carousel-viewport">
      <div id="carousel"></div>
    </div>
    <div id="gallery-empty">
      <p>No files yet.</p>
      <p>Drop files into <span id="empty-folder"></span> to see them here.</p>
    </div>
    <button class="gallery-nav" id="prev-btn">‹</button>
    <button class="gallery-nav" id="next-btn">›</button>
    <div id="progress-bar"></div>
    <div id="thumb-strip"></div>
  </div>

  <script>
  /* ── CONFIG ── */
  const REPO    = 'hutch7575/portfolio';
  const BRANCH  = 'main';
  const API     = `https://api.github.com/repos/${REPO}/contents`;
  const RAW     = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
  const IMG_EXT = ['jpg','jpeg','png','gif','webp','svg','avif'];
  const VID_EXT = ['mp4','webm','mov','ogg'];
  const getExt  = f => f.split('.').pop().toLowerCase();

  /* ── CURSOR ── */
  const cur   = document.getElementById('cursor');
  const trail = document.getElementById('cursor-trail');
  let mx=0, my=0, tx=0, ty=0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px';
    cur.style.top  = my + 'px';
  });

  (function animTrail() {
    tx += (mx - tx) * 0.13;
    ty += (my - ty) * 0.13;
    trail.style.left = tx + 'px';
    trail.style.top  = ty + 'px';
    requestAnimationFrame(animTrail);
  })();

  document.addEventListener('mouseover', e => {
    const h = !!e.target.closest('.landing-card, button, .thumb');
    cur.classList.toggle('hovering', h);
  });

  /* ── EDGE BLEED ── */
  // For each slide, we draw left/right canvases that sample the image's edge columns
  // and paint them with a gradient fade to --bg
  function buildBleed(imgEl, slideEl) {
    const leftCanvas  = slideEl.querySelector('.slide-bleed-left');
    const rightCanvas = slideEl.querySelector('.slide-bleed-right');
    if (!leftCanvas || !rightCanvas) return;

    // wait until image is loaded and laid out
    function draw() {
      try {
        const offscreen = document.createElement('canvas');
        offscreen.width  = imgEl.naturalWidth  || imgEl.videoWidth  || 400;
        offscreen.height = imgEl.naturalHeight || imgEl.videoHeight || 300;
        const ctx = offscreen.getContext('2d');
        ctx.drawImage(imgEl, 0, 0, offscreen.width, offscreen.height);

        // sample left edge: average colour of leftmost 6px column
        const lData = ctx.getImageData(0, 0, 6, offscreen.height);
        const lColor = avgColor(lData.data);

        // sample right edge: rightmost 6px
        const rData = ctx.getImageData(offscreen.width - 6, 0, 6, offscreen.height);
        const rColor = avgColor(rData.data);

        // paint left canvas: solid lColor → transparent (right)
        paintBleed(leftCanvas, lColor, 'left');
        paintBleed(rightCanvas, rColor, 'right');
      } catch(e) {
        // cross-origin fallback: just use dark
        paintBleed(leftCanvas,  {r:8,g:8,b:8}, 'left');
        paintBleed(rightCanvas, {r:8,g:8,b:8}, 'right');
      }
    }

    if (imgEl.complete || imgEl.readyState >= 2) {
      // small delay to ensure layout is done
      setTimeout(draw, 80);
    } else {
      imgEl.addEventListener('load', () => setTimeout(draw, 80), {once:true});
      imgEl.addEventListener('loadeddata', () => setTimeout(draw, 80), {once:true});
    }
  }

  function avgColor(data) {
    let r=0,g=0,b=0,count=0;
    for (let i=0; i<data.length; i+=4) {
      r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
    }
    return { r:Math.round(r/count), g:Math.round(g/count), b:Math.round(b/count) };
  }

  function paintBleed(canvas, color, side) {
    const w = canvas.offsetWidth  || 220;
    const h = canvas.offsetHeight || window.innerHeight;
    canvas.width  = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    // gradient: opaque edge colour → transparent (toward center)
    const grad = ctx.createLinearGradient(
      side==='left'?0:w, 0,
      side==='left'?w:0, 0
    );
    grad.addColorStop(0,   `rgba(${color.r},${color.g},${color.b},1)`);
    grad.addColorStop(0.55,`rgba(${color.r},${color.g},${color.b},0.6)`);
    grad.addColorStop(1,   `rgba(${color.r},${color.g},${color.b},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  /* ── DATA ── */
  let imageFiles=[], videoFiles=[];

  async function loadFolder(folder) {
    try {
      const r = await fetch(`${API}/${folder}`);
      if (!r.ok) return [];
      const d = await r.json();
      return Array.isArray(d) ? d.filter(f=>f.name!=='.gitkeep') : [];
    } catch { return []; }
  }

  async function init() {
    [imageFiles, videoFiles] = await Promise.all([loadFolder('images'), loadFolder('videos')]);
    const imgs = imageFiles.filter(f=>IMG_EXT.includes(getExt(f.name)));
    const vids = videoFiles.filter(f=>VID_EXT.includes(getExt(f.name)));

    document.getElementById('count-images').textContent = `${imgs.length} file${imgs.length!==1?'s':''}`;
    document.getElementById('count-videos').textContent = `${vids.length} file${vids.length!==1?'s':''}`;

    if (imgs.length) {
      const bg = document.getElementById('card-bg-images');
      bg.style.backgroundImage = `url(${RAW}/images/${imgs[0].name})`;
      bg.className = 'card-bg card-bg-photo';
    }
  }

  /* ── GALLERY NAV ── */
  let currentType='images', currentIndex=0, slides=[], isAnimating=false;

  document.getElementById('card-images').addEventListener('click', ()=>openGallery('images'));
  document.getElementById('card-videos').addEventListener('click', ()=>openGallery('videos'));

  function openGallery(type) {
    currentType = type; currentIndex = 0;
    const files = type==='images'
      ? imageFiles.filter(f=>IMG_EXT.includes(getExt(f.name)))
      : videoFiles.filter(f=>VID_EXT.includes(getExt(f.name)));
    document.getElementById('gallery-title').textContent = type==='images'?'Images':'Videos';
    document.getElementById('landing').classList.add('out');
    document.getElementById('gallery').classList.add('active');
    buildCarousel(files, type);
  }

  document.getElementById('back-btn').addEventListener('click', ()=>{
    document.getElementById('landing').classList.remove('out');
    document.getElementById('gallery').classList.remove('active');
    document.querySelectorAll('#carousel video').forEach(v=>v.pause());
  });

  /* ── BUILD CAROUSEL ── */
  function buildCarousel(files, type) {
    slides = files;
    const carousel   = document.getElementById('carousel');
    const thumbStrip = document.getElementById('thumb-strip');
    const empty      = document.getElementById('gallery-empty');
    carousel.innerHTML=''; thumbStrip.innerHTML='';

    if (!files.length) {
      empty.classList.add('show');
      document.getElementById('empty-folder').textContent = type+'/';
      document.getElementById('prev-btn').style.visibility='hidden';
      document.getElementById('next-btn').style.visibility='hidden';
      return;
    }
    empty.classList.remove('show');
    document.getElementById('prev-btn').style.visibility='';
    document.getElementById('next-btn').style.visibility='';

    files.forEach((file, i) => {
      const url   = `${RAW}/${type}/${file.name}`;
      const isVid = VID_EXT.includes(getExt(file.name));

      const slide = document.createElement('div');
      slide.className = 'slide';

      // edge bleed canvases
      const bleedL = document.createElement('canvas');
      bleedL.className = 'slide-bleed-left';
      const bleedR = document.createElement('canvas');
      bleedR.className = 'slide-bleed-right';

      // top/bottom vignette
      const vig = document.createElement('div');
      vig.className = 'slide-vignette';

      // media
      const wrap = document.createElement('div');
      wrap.className = 'slide-media-wrap';
      let mediaEl;

      if (isVid) {
        mediaEl = document.createElement('video');
        mediaEl.src=url; mediaEl.loop=true; mediaEl.muted=true;
        mediaEl.playsInline=true; mediaEl.preload='metadata';
      } else {
        mediaEl = document.createElement('img');
        mediaEl.src=url; mediaEl.alt=file.name;
        mediaEl.loading = i===0?'eager':'lazy';
        mediaEl.draggable=false;
        // crossOrigin needed for canvas pixel reading
        mediaEl.crossOrigin='anonymous';
      }
      wrap.appendChild(mediaEl);

      // filename label
      const info = document.createElement('div');
      info.className='slide-info';
      info.innerHTML=`<span class="slide-name">${file.name}</span>`;

      slide.appendChild(bleedL);
      slide.appendChild(bleedR);
      slide.appendChild(vig);
      slide.appendChild(wrap);
      slide.appendChild(info);
      carousel.appendChild(slide);

      // wire up bleed
      buildBleed(mediaEl, slide);

      // thumb
      const thumb = document.createElement('div');
      thumb.className = 'thumb'+(i===0?' active':'');
      const tEl = isVid ? document.createElement('video') : document.createElement('img');
      tEl.src=url; if(isVid){tEl.muted=true; tEl.preload='metadata';}
      thumb.appendChild(tEl);
      thumb.addEventListener('click', ()=>goTo(i));
      thumbStrip.appendChild(thumb);
    });

    goTo(0, true);
  }

  /* ── GOTO ── */
  function goTo(idx, instant=false) {
    if (isAnimating && !instant) return;
    isAnimating = true;

    const prevVid = document.querySelector(`.slide:nth-child(${currentIndex+1}) video`);
    if (prevVid) prevVid.pause();

    currentIndex = ((idx % slides.length) + slides.length) % slides.length;

    const carousel = document.getElementById('carousel');
    carousel.style.transition = instant ? 'none' : 'transform .72s cubic-bezier(.16,1,.3,1)';
    carousel.style.transform  = `translateX(${-currentIndex * 100}vw)`;

    setTimeout(() => {
      const curVid = document.querySelector(`.slide:nth-child(${currentIndex+1}) video`);
      if (curVid) curVid.play();
      isAnimating = false;
    }, instant ? 0 : 720);

    // ui updates
    document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===currentIndex));
    document.getElementById('gallery-counter').textContent =
      String(currentIndex+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
    document.getElementById('progress-bar').style.width =
      ((currentIndex+1)/slides.length*100)+'%';

    const activeThumb = document.querySelectorAll('.thumb')[currentIndex];
    if (activeThumb) activeThumb.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});

    // peek filename briefly
    document.querySelectorAll('.slide-info').forEach(el=>el.classList.remove('peek'));
    const info = document.querySelector(`.slide:nth-child(${currentIndex+1}) .slide-info`);
    if (info) {
      clearTimeout(info._t);
      info.classList.add('peek');
      info._t = setTimeout(()=>info.classList.remove('peek'), 2200);
    }

    applyParallax(lastNX);
  }

  document.getElementById('prev-btn').addEventListener('click', ()=>goTo(currentIndex-1));
  document.getElementById('next-btn').addEventListener('click', ()=>goTo(currentIndex+1));

  document.addEventListener('keydown', e=>{
    if (!document.getElementById('gallery').classList.contains('active')) return;
    if (e.key==='ArrowRight'||e.key==='ArrowDown') goTo(currentIndex+1);
    if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   goTo(currentIndex-1);
    if (e.key==='Escape') document.getElementById('back-btn').click();
  });

  /* ── PARALLAX ── */
  let lastNX = 0;
  document.addEventListener('mousemove', e=>{
    lastNX = (e.clientX/window.innerWidth - .5) * 2;
    applyParallax(lastNX);
  });

  function applyParallax(nx) {
    const slide = document.querySelector(`.slide:nth-child(${currentIndex+1})`);
    if (!slide) return;
    const media = slide.querySelector('img, video');
    if (media) media.style.transform = `translateX(${nx * 10}px)`;
  }

  /* ── SWIPE ── */
  let dragStart=null, dragging=false;

  const vp = document.getElementById('carousel-viewport');
  vp.addEventListener('pointerdown', e=>{ dragStart=e.clientX; dragging=true; vp.setPointerCapture(e.pointerId); });
  vp.addEventListener('pointermove', e=>{
    if (!dragging) return;
    const d = e.clientX - dragStart;
    const c = document.getElementById('carousel');
    c.style.transition='none';
    c.style.transform=`translateX(calc(${-currentIndex*100}vw + ${d}px))`;
  });
  vp.addEventListener('pointerup', e=>{
    if (!dragging) return; dragging=false;
    const d = e.clientX - dragStart;
    if (Math.abs(d)>55) goTo(d<0?currentIndex+1:currentIndex-1);
    else goTo(currentIndex);
    dragStart=null;
  });

  /* ── BOOT ── */
  init();
  </script>
</body>
</html>
