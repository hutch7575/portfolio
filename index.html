<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Josh Walls — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="noise"></div>

<!-- ═══ LANDING ═══ -->
<div class="screen on" id="sc-cat">

  <div id="cat-spot"></div>

  <!-- top bar -->
  <div id="cat-bar">
    <span class="cat-bar-logo">Graphic Design</span>
    <button id="theme-toggle">
      <span class="icon">☽</span>
      <span id="theme-label">Light</span>
    </button>
  </div>

  <!-- centred content -->
  <div class="cat-main">
    <div class="cat-layout">

      <!-- name plate -->
      <div class="cat-nameplate">
        <span class="cat-nameplate-eyebrow">Graphic Design Portfolio</span>
        <span class="cat-nameplate-name">Josh Walls<span>.</span></span>

      </div>

      <!-- category cards -->
      <div class="cat-cards">

        <div class="cat-card" id="zone-img">
          <div class="cat-card-preview no-preview" id="cat-bg-images"></div>
          <div class="cat-card-body">
            <span class="cat-card-index">01 —</span>
            <span class="cat-card-title">Images</span>
            <span class="cat-card-count" id="cat-img-count">Loading…</span>
          </div>
          <span class="cat-card-arrow">→</span>
        </div>

        <div class="cat-card" id="zone-vid">
          <div class="cat-card-preview no-preview" id="cat-bg-videos"></div>
          <div class="cat-card-body">
            <span class="cat-card-index">02 —</span>
            <span class="cat-card-title">Videos</span>
            <span class="cat-card-count" id="cat-vid-count">Loading…</span>
          </div>
          <span class="cat-card-arrow">→</span>
        </div>

      </div>
    </div>
  </div>

  <!-- footer -->
  <div id="cat-footer">
    <span class="cat-footer-l">Josh Walls Porfolio <span id="version-tag">v1.8</span></span>
    <span class="cat-footer-r">Built with <span>Claude</span> · Anthropic</span>
  </div>

</div>

<!-- ═══ IMAGE GALLERY ═══ -->
<div class="screen" id="sc-gallery">
  <div id="wall-spot"></div>
  <div id="gal-bar">
    <button id="gal-back"><span class="arr">←</span> Back</button>
    <span id="gal-title-bar">Images</span>
    <span id="gal-ctr"></span>
  </div>
  <div id="gal-wall"></div>
  <button class="gal-nav" id="gal-prev">‹</button>
  <button class="gal-nav" id="gal-next">›</button>
  <div id="gal-prog"></div>
  <div class="nav-hint" id="gal-hint">
    <span><span class="nav-hint-key">←</span><span class="nav-hint-key">→</span> Navigate</span>
    <span class="nav-hint-sep">·</span>
    <span>Swipe to browse</span>
    <span class="nav-hint-sep">·</span>
    <span>Hold image to reveal info</span>
  </div>
</div>

<!-- ═══ VIDEO GALLERY ═══ -->
<div class="screen" id="sc-tv">
  <div id="vid-spot"></div>
  <div id="tv-bar">
    <button id="tv-back"><span class="arr">←</span> Back</button>
    <span id="tv-title-bar">Videos</span>
    <span id="tv-ctr"></span>
  </div>
  <div id="vid-wall"></div>
  <button class="vid-nav" id="vid-prev">‹</button>
  <button class="vid-nav" id="vid-next">›</button>
  <div id="vid-prog"></div>
  <div class="nav-hint" id="vid-hint">
    <span><span class="nav-hint-key">←</span><span class="nav-hint-key">→</span> Navigate</span>
    <span class="nav-hint-sep">·</span>
    <span>Swipe to browse</span>
    <span class="nav-hint-sep">·</span>
    <span>Hold video to reveal info</span>
  </div>
  <div id="vid-controls" style="display:none">
    <button class="vid-ctrl-btn" id="vid-audio-btn" title="Toggle audio">🔇</button>
    <button class="vid-ctrl-btn" id="vid-fs-btn" title="Fullscreen">⛶</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
